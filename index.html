<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T1S | Premium Middle School SNS</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text: #f1f5f9;
            --sub-text: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #0f172a);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: var(--card);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            font-size: 3em;
            margin: 0 0 20px 0;
            color: var(--accent);
            letter-spacing: 5px;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid transparent;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.6);
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            font-size: 16px;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            filter: brightness(1.2);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4);
        }

        .post-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 16px;
            margin-top: 15px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .post-user {
            font-size: 0.85em;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
        }

        .post-user::before {
            content: "●";
            margin-right: 5px;
            font-size: 0.6em;
        }

        .post-text {
            font-size: 0.95em;
            line-height: 1.5;
            word-wrap: break-word;
        }

        #timeline {
            margin-top: 25px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* スクロールバーをおしゃれに */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

<div id="app" class="container">
    <h1>T1S</h1>
    <div id="auth-ui">
        <input type="text" id="loginId" placeholder="ユーザーID">
        <input type="password" id="pinCode" placeholder="4桁のPIN">
        <button onclick="login()">ENTER</button>
        <button style="background: transparent; color: var(--sub-text); border: 1px solid #334155; margin-top: 15px;" onclick="requestAccess()">新規申請</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD2-XU5R6upCUgSDJbDz7iSoEQCzrzusLk",
        authDomain: "t1s-sns.firebaseapp.com",
        projectId: "t1s-sns",
        storageBucket: "t1s-sns.firebasestorage.app",
        messagingSenderId: "377338728077",
        appId: "1:377338728077:web:1205ed292e4181869adcc4"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function login() {
        const id = document.getElementById('loginId').value;
        const pin = document.getElementById('pinCode').value;
        if(!id || !pin) return;

        const snapshot = await db.collection("requests").where("userId", "==", id).where("pin", "==", pin).get();
        if (snapshot.empty) return alert("認証エラー：IDまたはPINが違います");

        const user = snapshot.docs[0].data();
        if (user.isApproved) {
            showMainPage(id);
        } else {
            alert("アクセス拒否：管理人の承認が必要です");
        }
    }

    async function requestAccess() {
        const id = document.getElementById('loginId').value;
        const pin = document.getElementById('pinCode').value;
        if(!id || !pin) return alert("IDとPINを入力してから申請してね");
        await db.collection("requests").add({ userId: id, pin: pin, isApproved: false, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        alert("リクエスト送信完了。管理人の許可を待て！");
    }

    function showMainPage(username) {
        document.getElementById('app').innerHTML = `
            <h1 style="font-size: 2em;">T1S</h1>
            <div style="text-align:left; font-size:0.8em; color:var(--sub-text); margin-bottom:15px; border-bottom:1px solid #334155; padding-bottom:10px;">
                CONNECTED AS: <span style="color:var(--accent)">${username}</span>
            </div>
            <textarea id="postInput" placeholder="何を考えてる？" rows="3"></textarea>
            <button onclick="sendPost('${username}')">POST</button>
            <div id="timeline"></div>
            <button onclick="location.reload()" style="background:none; color:#666; font-size:0.7em; border:none; margin-top:20px;">SYSTEM LOGOUT</button>
        `;
        loadPosts();
    }

    async function sendPost(username) {
        const text = document.getElementById('postInput').value;
        if(!text.trim()) return;
        await db.collection("posts").add({
            user: username,
            text: text,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('postInput').value = "";
    }

    function loadPosts() {
        db.collection("posts").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                timeline.innerHTML += `
                    <div class="post-card">
                        <div class="post-user">${data.user}</div>
                        <div class="post-text">${data.text.replace(/\n/g, '<br>')}</div>
                    </div>
                `;
            });
        });
    }
</script>
</body>
</html>
