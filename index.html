<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShoSNS</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #020617; --card: rgba(15, 23, 42, 0.9); --accent: #00f2ff; --accent-glow: rgba(0, 242, 255, 0.5); --text: #e2e8f0; }
        body { font-family: sans-serif; background-color: var(--bg); background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%); color: var(--text); margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; }
        .main-wrapper { width: 100%; max-width: 1000px; padding: 20px; box-sizing: border-box; }
        h1 { text-align: center; color: var(--accent); letter-spacing: 5px; text-shadow: 0 0 10px var(--accent-glow); margin-top: 20px; }
        .grid-layout { display: grid; gap: 20px; grid-template-columns: 1fr; }
        @media (min-width: 768px) { .grid-layout { grid-template-columns: 350px 1fr; } }
        .panel { background: var(--card); border: 1px solid var(--accent); padding: 20px; border-radius: 4px; height: fit-content; }
        .vc-panel { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--accent); padding: 15px; margin-bottom: 20px; text-align: center; }
        .status-dot { display: inline-block; width: 10px; height: 10px; background: #334155; border-radius: 50%; margin-right: 8px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: rgba(0,0,0,0.7); color: var(--accent); border: 1px solid #1e293b; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: transparent; color: var(--accent); border: 1px solid var(--accent); font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: var(--accent); color: #000; }
        button:disabled { border-color: #475569; color: #475569; cursor: not-allowed; }
        #timeline { display: flex; flex-direction: column; gap: 15px; }
        .post-card { background: rgba(255, 255, 255, 0.03); padding: 15px; border-left: 3px solid var(--accent); }
        .post-user { color: var(--accent); font-size: 0.8em; margin-bottom: 5px; opacity: 0.7; }
        .post-text { font-size: 1.1em; line-height: 1.4; word-wrap: break-word; }
        .auth-container { max-width: 400px; margin: 100px auto; }
    </style>
</head>
<body>

<div id="root" class="main-wrapper">
    <div class="auth-container panel">
        <h1>ShoSNS</h1>
        <input type="text" id="loginId" placeholder="ユーザーID">
        <input type="password" id="pinCode" placeholder="PINコード">
        <button onclick="login()">ログイン</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@skyway-sdk/core/dist/skyway_core.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
    let currentUserName = "";
    const appId = "e78d2560-389d-4d0e-a981-5214050d87ca";
    const firebaseConfig = {
        apiKey: "AIzaSyD2-XU5R6upCUgSDJbDz7iSoEQCzrzusLk",
        authDomain: "t1s-sns.firebaseapp.com",
        projectId: "t1s-sns",
        storageBucket: "t1s-sns.appspot.com",
        messagingSenderId: "377338728077",
        appId: "1:377338728077:web:1205ed292e4181869adcc4"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const { SkyWayContext, SkyWayRoom, SkyWayStreamFactory } = skyway_sdk_core;

    async function login() {
        const id = document.getElementById('loginId').value;
        const pin = document.getElementById('pinCode').value;
        try {
            const snapshot = await db.collection("requests").where("userId", "==", id).get();
            if (snapshot.empty) return alert("ユーザーが見つかりません");
            const data = snapshot.docs[0].data();
            if (data.pin == pin && data.isApproved) {
                currentUserName = id;
                showMainPage(id);
            } else { alert("PINが違うか、承認されていません"); }
        } catch (e) { alert("ログインエラー: " + e.message); }
    }

    function showMainPage(username) {
        document.getElementById('root').innerHTML = `
            <h1>ShoSNS</h1>
            <div class="grid-layout">
                <div class="panel">
                    <div class="vc-panel">
                        <div style="font-size:0.8em; margin-bottom:10px;"><span id="vc-dot" class="status-dot"></span>VOICE ROOM</div>
                        <button id="joinBtn" onclick="joinVC()">入室する</button>
                    </div>
                    <textarea id="postInput" placeholder="今なにしてる？" rows="4"></textarea>
                    <button onclick="sendPost()">投稿する</button>
                    <button onclick="location.reload()" style="border:none; color:#475569; font-size:0.8em; cursor:pointer; margin-top:30px;">ログアウト</button>
                </div>
                <div id="timeline"></div>
            </div>
        `;
        loadPosts();
    }

    // --- ボイチャ修正ポイント: 音声コンテキストの有効化 ---
    async function joinVC() {
        const btn = document.getElementById('joinBtn');
        const dot = document.getElementById('vc-dot');
        btn.disabled = true;
        btn.innerText = "接続中...";

        try {
            const context = await SkyWayContext.Create(appId);
            const room = await SkyWayRoom.FindOrCreate(context, { type: 'p2p', name: 'ShoRoom' });
            const me = await room.join();

            // マイク取得
            const audioStream = await SkyWayStreamFactory.createMicrophoneAudioStream();
            await me.publish(audioStream);

            const subscribe = async (publication) => {
                if (publication.publisherId === me.id) return;
                const { stream } = await me.subscribe(publication.id);
                
                const audio = document.createElement('audio');
                audio.srcObject = stream.track;
                audio.playsInline = true; // iOS対策
                audio.autoplay = true;
                document.body.appendChild(audio);
                
                // ブラウザの自動再生制限対策
                audio.play().catch(() => {
                    console.log("Autoplay blocked. User gesture needed.");
                    btn.innerText = "クリックして音声を有効化";
                    btn.onclick = () => { audio.play(); btn.innerText = "通話中"; };
                });
            };

            room.onStreamPublished.add((e) => subscribe(e.publication));
            room.publications.forEach(subscribe);

            btn.innerText = "通話中";
            btn.style.borderColor = "#00ff00";
            dot.style.background = "#00ff00";
            btn.onclick = null; // 入室ボタンの多重押し防止

        } catch (e) {
            console.error(e);
            alert("通話エラー: 他のアプリでマイクを使用中か、ブラウザの設定を確認してください。");
            btn.disabled = false;
            btn.innerText = "入室する";
        }
    }

    async function sendPost() {
        const textInput = document.getElementById('postInput');
        const text = textInput.value;
        if(!text.trim()) return;
        await db.collection("posts").add({ 
            user: currentUserName, text: text, 
            createdAt: firebase.firestore.FieldValue.serverTimestamp() 
        });
        textInput.value = "";
    }

    function loadPosts() {
        db.collection("posts").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            const tl = document.getElementById('timeline');
            if(!tl) return;
            tl.innerHTML = "";
            snapshot.forEach(doc => {
                const p = doc.data();
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `<div class="post-user">${p.user || 'Unknown'}</div><div class="post-text">${p.text || ''}</div>`;
                tl.appendChild(card);
            });
        });
    }
</script>
</body>
</html>
