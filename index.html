<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoiceHello</title>
    <link class="apple-touch-icon" rel="apple-touch-icon" href="https://chromebookuser0001-cyber.github.io/sho-/shophoto.jpg">
    <link rel="icon" href="https://chromebookuser0001-cyber.github.io/sho-/shophoto.jpg">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="VoiceHello">
    <style>
        :root { 
            --bg: #0b0c16; 
            --card: #15182e; 
            --accent: #00f0ff; 
            --pink: #ff007f;
            --green: #39ff14;
            --text: #e2e2ff; 
            --border: rgba(0, 240, 255, 0.2);
            --sub-text: #7c7ca3;
            --miiverse-orange: #ff9900;
            --purple: #bf55ec;
            --gold: #ffd700;
        }
        :root.light-mode {
            --bg: #f2f4f8;
            --card: #ffffff;
            --accent: #0076ff;
            --pink: #e0006c;
            --green: #00a835;
            --text: #1a1a2e;
            --border: rgba(0, 118, 255, 0.15);
            --sub-text: #6e6e8a;
        }
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; transition: background-color 0.3s, color 0.3s; }
        .container { width: 100%; max-width: 650px; background: var(--card); border: 2px solid var(--border); min-height: 95vh; padding: 15px; box-sizing: border-box; border-radius: 28px; transition: background 0.3s, border-color 0.3s; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        
        h1 { text-align: center; color: var(--accent); letter-spacing: 1px; margin: 5px 0; font-size: 1.6em; font-weight: 900; text-shadow: 0 0 6px rgba(0, 240, 255, 0.2); }
        .last-update-tag { text-align: center; font-size: 0.7em; color: var(--sub-text); margin-bottom: 20px; font-weight: bold; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; border-bottom: 2px solid rgba(128,128,128,0.1); padding-bottom: 8px; }
        .tab-btn { background: transparent; border: 2px solid transparent; color: var(--sub-text); padding: 6px 16px; border-radius: 20px; font-size: 0.85em; font-weight: bold; width: auto; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 8px rgba(0,240,255,0.3); }

        .stories-container { display: flex; gap: 14px; overflow-x: auto; white-space: nowrap; padding: 5px 5px 12px 5px; margin-bottom: 15px; border-bottom: 1px solid rgba(128, 128, 128, 0.1); -webkit-overflow-scrolling: touch; }
        .story-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75em; color: var(--text); min-width: 64px; max-width: 64px; text-align: center; cursor: pointer; }
        .story-avatar { width: 48px; height: 48px; border-radius: 50%; background: #1b1e36; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1em; color: var(--accent); margin-bottom: 4px; border: 2px solid #333; box-sizing: border-box; position: relative; background-size: cover; background-position: center; }
        .story-item.online .story-avatar { border: 2px solid transparent; background-image: linear-gradient(var(--card), var(--card)), linear-gradient(135deg, var(--pink), var(--accent)); background-origin: border-box; background-clip: content-box, border-box; }
        .story-item.online .story-avatar::after { content: ""; position: absolute; bottom: 1px; right: 1px; width: 9px; height: 9px; background: var(--green); border-radius: 50%; border: 2px solid var(--card); }
        .user-status-text { font-size: 0.7em; color: var(--pink); max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-style: italic; }

        .thread-item { background: rgba(128, 128, 128, 0.03); border: 2px solid rgba(128, 128, 128, 0.12); padding: 14px; margin-bottom: 12px; cursor: pointer; border-radius: 20px; position: relative; transition: transform 0.15s, border-color 0.15s; display: flex; align-items: center; gap: 12px; }
        .thread-item:hover { transform: translateY(-2px); border-color: var(--accent); }
        .thread-item.event-th { border-color: var(--purple); box-shadow: 0 0 10px rgba(191, 85, 236, 0.15); }
        .thread-icon-box { width: 44px; height: 44px; background: rgba(0, 240, 255, 0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4em; border: 1px solid rgba(0,240,255,0.2); }
        .thread-main { flex-grow: 1; min-width: 0; }
        .thread-header { display: flex; justify-content: space-between; font-size: 0.75em; color: var(--sub-text); margin-bottom: 3px; }
        
        .form-area { background: rgba(128, 128, 128, 0.02); border: 1px solid rgba(128, 128, 128, 0.1); padding: 14px; margin-bottom: 16px; border-radius: 20px; }
        .notice-area { border: 2px solid var(--pink); background: rgba(255, 0, 127, 0.02); padding: 12px; margin-bottom: 16px; border-radius: 20px; }
        .notice-title { color: var(--pink); font-weight: bold; font-size: 0.85em; margin-bottom: 4px; letter-spacing: 1px; }
        
        input, textarea, select { width: 100%; padding: 11px; margin: 5px 0; background: rgba(0,0,0,0.2); color: var(--text); border: 2px solid rgba(128, 128, 128, 0.15); box-sizing: border-box; border-radius: 14px; font-size: 15px; outline: none; }
        :root.light-mode input, :root.light-mode textarea, :root.light-mode select { background: #fdfdfd; }
        button { width: 100%; padding: 11px; border: none; background: linear-gradient(90deg, #00c6ff, #0072ff); color: #fff; border-radius: 14px; font-weight: bold; cursor: pointer; font-size: 15px; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }
        .btn-pink { background: linear-gradient(90deg, #ff007f, #ff0055); }
        .btn-purple { background: linear-gradient(90deg, #bf55ec, #9b59b6); }
        .btn-danger { background: linear-gradient(90deg, #ef4444, #dc2626) !important; color: white !important; }
        .btn-small { width: auto; padding: 4px 10px; font-size: 0.75em; margin: 0; background: rgba(128,128,128,0.1); color: var(--text); border-radius: 10px; }
        
        .post { background: rgba(128, 128, 128, 0.02); border: 2px solid rgba(128, 128, 128, 0.08); padding: 12px; margin-bottom: 12px; border-radius: 20px; }
        .post-info { display: flex; align-items: center; gap: 8px; color: var(--accent); font-size: 0.8em; margin-bottom: 6px; }
        .post-body { font-size: 0.95em; color: var(--text); white-space: pre-wrap; word-break: break-all; }
        
        .nav { display: flex; justify-content: space-between; margin-bottom: 12px; gap: 6px; align-items: center; }
        .talkers-count { font-size: 0.75em; color: var(--green); font-weight: bold; margin-top: 2px; display: block;}
        
        .admin-item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(128,128,128,0.1); font-size: 0.9em; }
        .admin-sec-title { font-size: 1.1em; font-weight: bold; color: var(--accent); margin: 15px 0 8px 0; border-left: 4px solid var(--accent); padding-left: 8px; }
        .badge-tag { background: rgba(0, 240, 255, 0.15); color: var(--accent); font-size: 0.75em; padding: 1px 6px; border-radius: 5px; font-weight: bold; margin-left: 4px; border: 1px solid rgba(0, 240, 255, 0.3); }
    </style>
</head>
<body>
<div id="root" class="container"></div>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.21.0.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
    const AGORA_APP_ID = "1563871745f642a5a5332fe7ee3ebeba"; 
    const ADMIN_USER_ID = "admin"; 
    const LAST_UPDATE_TIME = "2026/06/21 18:25";

    let currentUserName = "";
    let currentThreadId = null;
    let currentThreadIsEvent = false;
    let db, client, localAudioTrack;
    let unsubscribeThreads = null, unsubscribePosts = null, unsubscribePresence = null, unsubscribeMembers = null, unsubscribeNotice = null, unsubscribeStatuses = null, unsubscribeAvatars = null, unsubscribeTitles = null;
    let keepAliveInterval = null;
    let userStatuses = {};
    let userAvatars = {};
    let userTitles = {};
    let isDarkMode = true;
    let currentTab = "all"; 
    let searchKeyword = "";

    const firebaseConfig = {
        apiKey: "AIzaSyD2-XU5R6upCUgSDJbDz7iSoEQCzrzusLk",
        authDomain: "t1s-sns.firebaseapp.com",
        projectId: "t1s-sns",
        storageBucket: "t1s-sns.appspot.com",
        messagingSenderId: "377338728077",
        appId: "1:377338728077:web:1205ed292e4181869adcc4"
    };

    window.onload = () => {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        
        client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        setupAgoraEvents();
        
        showLoginPage();
        setupExitEvents();
    };

    function setupAgoraEvents() {
        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "audio") {
                user.audioTrack.play(); 
                updateOnlineUsers();
            }
        });
        client.on("user-unpublished", (user) => { updateOnlineUsers(); });
        client.on("user-joined", (user) => { updateOnlineUsers(); });
        client.on("user-left", (user) => { updateOnlineUsers(); });
    }

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const rootEl = document.documentElement;
        if (!isDarkMode) rootEl.classList.add("light-mode");
        else rootEl.classList.remove("light-mode");
        const themeBtn = document.getElementById("theme-toggle-btn");
        if(themeBtn) themeBtn.innerText = isDarkMode ? '🌙 ダークモード' : '☀️ ライトモード';
    }

    function setupExitEvents() {
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "hidden") { goOfflineSync(); } 
            else if (currentUserName) { keepAlive(); }
        });
        window.addEventListener("beforeunload", () => { goOfflineSync(); });
    }

    function goOfflineSync() {
        if (!currentUserName) return;
        db.collection("users_status").doc(currentUserName).delete();
        db.collection("presence").doc(currentUserName).delete();
        db.collection("active_calls").doc(currentUserName).delete();
    }

    function linkify(text) {
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, function(url) {
            return '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + url + '</a>';
        });
    }

    function getNameWithBadge(userId) {
        let name = userId;
        if (userId === ADMIN_USER_ID) name += "👑";
        const title = userTitles[userId];
        if (title) name += `<span class="badge-tag">${title}</span>`;
        return name;
    }

    function showLoginPage() {
        document.getElementById('root').innerHTML = `
            <h1>VoiceHello</h1>
            <div class="last-update-tag">最終更新: ${LAST_UPDATE_TIME}</div>
            <div class="form-area">
                <input type="text" id="loginId" placeholder="ユーザーID">
                <input type="password" id="pinCode" placeholder="PINコード">
                <button onclick="login()">ログイン</button>
                <div style="text-align:center; margin-top:15px;">
                    <a href="#" style="color:var(--accent); font-weight:bold; text-decoration:none;" onclick="showRegisterPage()">✨ 新規アカウント申請</a>
                </div>
            </div>`;
    }

    function showRegisterPage() {
        document.getElementById('root').innerHTML = `
            <h1>VoiceHello</h1>
            <div class="form-area">
                <input type="text" id="regId" placeholder="希望ユーザーID">
                <input type="password" id="regPin" placeholder="希望PINコード">
                <button onclick="register()" class="btn-pink">利用申請を送信</button>
                <div style="text-align:center; margin-top:15px;">
                    <a href="#" style="color:var(--sub-text); text-decoration:none;" onclick="showLoginPage()">⬅️ 戻る</a>
                </div>
            </div>`;
    }

    async function login() {
        const id = document.getElementById('loginId').value.trim();
        const pin = document.getElementById('pinCode').value;
        if(!id || !pin) return alert("入力してください");
        const snap = await db.collection("requests").where("userId", "==", id).get();
        if (snap.empty) return alert("アカウントが見つかりません");
        const data = snap.docs[0].data();
        if (data.pin == pin && data.isApproved) { 
            currentUserName = id; showThreadList(); keepAlive();
            if(keepAliveInterval) clearInterval(keepAliveInterval);
            keepAliveInterval = setInterval(keepAlive, 30000);
        } else { alert("承認待ちか、PINが違います"); }
    }

    async function register() {
        const id = document.getElementById('regId').value.trim();
        const pin = document.getElementById('regPin').value;
        if(!id || !pin) return alert("入力してください");
        await db.collection("requests").add({ userId: id, pin: pin, isApproved: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        alert("申請しました！承認を待ってね。"); showLoginPage();
    }

    async function keepAlive() {
        if (!currentUserName || document.visibilityState === "hidden") return;
        await db.collection("users_status").doc(currentUserName).set({ lastActive: firebase.firestore.FieldValue.serverTimestamp() });
    }

    async function updatePresence(threadId) {
        if (!currentUserName || document.visibilityState === "hidden") return;
        const ref = db.collection("presence").doc(currentUserName);
        if (threadId) await ref.set({ threadId, lastSeen: firebase.firestore.FieldValue.serverTimestamp() });
        else await ref.delete();
    }

    async function setStatus() {
        const text = document.getElementById('myStatusInput').value;
        await db.collection("statuses").doc(currentUserName).set({ text, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        document.getElementById('myStatusInput').value = "";
    }

    async function saveAvatar() {
        const url = document.getElementById('myAvatarInput').value.trim();
        await db.collection("avatars").doc(currentUserName).set({ url });
        alert("アイコンを更新しました！");
    }

    function showThreadList() {
        if(unsubscribeThreads) unsubscribeThreads();
        if(unsubscribePosts) unsubscribePosts();
        if(unsubscribePresence) unsubscribePresence();
        if(unsubscribeMembers) unsubscribeMembers();
        if(unsubscribeNotice) unsubscribeNotice();
        if(unsubscribeStatuses) unsubscribeStatuses();
        if(unsubscribeAvatars) unsubscribeAvatars();
        if(unsubscribeTitles) unsubscribeTitles();
        
        updatePresence(null);
        currentThreadId = null;
        currentThreadIsEvent = false;
        leaveCall();
        
        let adminBtn = (currentUserName === ADMIN_USER_ID) ? `<button class="btn-small" style="color:var(--pink);" onclick="showAdminPage()">👑 管理画面</button>` : "";

        document.getElementById('root').innerHTML = `
            <div class="nav">
                <button id="theme-toggle-btn" class="btn-small" onclick="toggleTheme()">${isDarkMode ? '🌙 ダークモード' : '☀️ ライトモード'}</button>
                <div class="nav-right" style="display:flex; gap:6px;">
                    ${adminBtn}
                    <button class="btn-small" onclick="location.reload()">ログアウト</button>
                </div>
            </div>
            <div id="stories-area" class="stories-container"></div>
            
            <div class="form-area" style="padding:10px; margin-bottom:12px;">
                <input type="text" id="myStatusInput" placeholder="今なにしてる？" style="width:70%; margin:0;">
                <button onclick="setStatus()" class="btn-small" style="width:25%;">更新</button>
                <input type="text" id="myAvatarInput" placeholder="アイコン画像URL" style="width:70%; margin-top:5px;">
                <button onclick="saveAvatar()" class="btn-small" style="width:25%;">設定</button>
            </div>

            <div class="notice-area">
                <div class="notice-title">📢 NOTICE</div>
                <div id="notice-text-content">読み込み中...</div>
            </div>

            <h1>広場</h1>
            <input type="text" id="threadSearchInput" oninput="searchThreads()" placeholder="🔍 コミュニティを検索..." style="margin-bottom:10px;">
            <div class="tabs">
                <button id="tab-all" class="tab-btn active" onclick="changeTab('all')">すべて</button>
                <button id="tab-calling" class="tab-btn" onclick="changeTab('calling')">🗣️ 通話中</button>
            </div>
            
            <div id="list-area">スレッド読み込み中...</div>

            <div class="form-area" style="margin-top:20px;">
                <div style="font-weight:bold; margin-bottom:5px; color:var(--accent);">🆕 新しいコミュニティ</div>
                <input type="text" id="newThreadTitle" placeholder="タイトル">
                <textarea id="firstPost" rows="2" placeholder="内容..."></textarea>
                <button onclick="createThread()">開設する</button>
            </div>`;

        unsubscribeTitles = db.collection("user_titles").onSnapshot(ss => {
            userTitles = {};
            ss.forEach(doc => { userTitles[doc.id] = doc.data().title; });
            triggerThreadRender();
        });

        unsubscribeAvatars = db.collection("avatars").onSnapshot(ss => {
            userAvatars = {};
            ss.forEach(doc => { userAvatars[doc.id] = doc.data().url; });
        });

        unsubscribeStatuses = db.collection("statuses").onSnapshot(ss => {
            userStatuses = {};
            ss.forEach(doc => { userStatuses[doc.id] = doc.data().text; });
        });

        unsubscribeMembers = db.collection("users_status").onSnapshot(statusSnap => {
            const onlineUsers = new Set();
            const now = Date.now();
            statusSnap.forEach(doc => {
                if (doc.data().lastActive && (now - doc.data().lastActive.toMillis() < 120000)) onlineUsers.add(doc.id);
            });

            db.collection("requests").where("isApproved", "==", true).get().then(snap => {
                const area = document.getElementById("stories-area");
                if(!area) return;
                area.innerHTML = "";
                
                const onlineList = [];
                const offlineList = [];
                
                snap.forEach(doc => {
                    const uId = doc.data().userId;
                    if (onlineUsers.has(uId)) {
                        if (uId === currentUserName) onlineList.unshift(uId);
                        else onlineList.push(uId);
                    } else {
                        if (uId === currentUserName) offlineList.unshift(uId);
                        else offlineList.push(uId);
                    }
                });
                
                const sortedUsers = [...onlineList, ...offlineList];

                sortedUsers.forEach(uId => {
                    const isOnline = onlineUsers.has(uId);
                    const avatarUrl = userAvatars[uId] || "";
                    const bgStyle = avatarUrl ? `background-image: url('${avatarUrl}'); color:transparent;` : "";
                    const displayName = getNameWithBadge(uId);
                    const statusText = userStatuses[uId] ? userStatuses[uId] : "";
                    area.innerHTML += `
                        <div class="story-item ${isOnline ? 'online' : ''}">
                            <div class="story-avatar" style="${bgStyle}">${avatarUrl ? '' : uId.substring(0,2)}</div>
                            <div style="width:64px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${displayName}</div>
                            <div class="user-status-text">${statusText}</div>
                        </div>`;
                });
            });
        });

        unsubscribeThreads = db.collection("threads").orderBy("createdAt", "desc").onSnapshot(ss => {
            window.lastThreadSnapshot = ss;
            renderThreadList(ss);
        });

        unsubscribeNotice = db.collection("system").doc("notice").onSnapshot(doc => {
            const area = document.getElementById("notice-text-content");
            if (area && doc.exists) area.innerHTML = linkify(doc.data().text || "お知らせはありません。");
        });
    }

    function renderThreadList(ss) {
        const area = document.getElementById('list-area');
        if(!area) return;

        db.collection("active_calls").get().then(callSnap => {
            const threadTalkers = {};
            callSnap.forEach(d => { 
                const cData = d.data(); 
                if(!threadTalkers[cData.threadId]) threadTalkers[cData.threadId] = []; 
                threadTalkers[cData.threadId].push(d.id); 
            });

            area.innerHTML = "";
            ss.forEach(doc => {
                const data = doc.data();
                const talkers = threadTalkers[doc.id] || [];
                if (currentTab === "calling" && talkers.length === 0) return;
                if (searchKeyword && !data.title.toLowerCase().includes(searchKeyword)) return;

                const isEvent = data.isEvent === true;
                const talkersText = talkers.length > 0 ? `<span class="talkers-count">🗣️ ${talkers.map(t=>isEvent?'匿名':getNameWithBadge(t)).join(", ")} 通話中</span>` : "";
                const creator = isEvent ? "管理者イベント" : getNameWithBadge(data.creator);

                area.innerHTML += `
                    <div class="thread-item ${isEvent?'event-th':''}" onclick="showThreadDetail('${doc.id}', '${data.title}', ${isEvent})">
                        <div class="thread-icon-box">${isEvent?'🤫':'💬'}</div>
                        <div class="thread-main">
                            <div class="thread-header">作成者: ${creator}</div>
                            <div style="font-weight:bold;">${data.title}</div>
                            ${talkersText}
                        </div>
                    </div>`;
            });
        });
    }

    function searchThreads() {
        searchKeyword = document.getElementById('threadSearchInput').value.toLowerCase().trim();
        triggerThreadRender();
    }

    function triggerThreadRender() {
        if(window.lastThreadSnapshot) renderThreadList(window.lastThreadSnapshot);
    }

    function changeTab(tabName) {
        currentTab = tabName;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${tabName}`).classList.add('active');
        triggerThreadRender();
    }

    async function showThreadDetail(id, title, isEvent = false) {
        currentThreadId = id;
        currentThreadIsEvent = isEvent;
        await updatePresence(id);
        
        document.getElementById('root').innerHTML = `
            <div class="nav"><button class="btn-small" onclick="showThreadList()">⬅️ 戻る</button></div>
            ${isEvent ? '<div style="color:var(--purple); font-weight:bold; text-align:center; margin-bottom:10px;">🤫 ここは匿名スレッドです。誰が書いたか秘密になります！</div>' : ''}
            <h1 style="font-size:1.2em; text-align:left;">${title}</h1>
            <div id="call-status-area" style="margin-bottom:10px; font-size:0.8em; display:none;">● 通話中: <span id="online-users"></span></div>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <button id="join-btn" onclick="joinCall('${id}')">🔊 通話参加</button>
                <button id="leave-btn" style="display:none; background:var(--pink);" onclick="leaveCall()">🛑 終了</button>
            </div>
            <div class="form-area">
                <textarea id="replyText" rows="2" placeholder="コメント..."></textarea>
                <button onclick="sendReply()">投稿する</button>
            </div>
            <div id="post-area"></div>`;

        unsubscribePosts = db.collection("posts").where("threadId", "==", id).onSnapshot(ss => {
            const area = document.getElementById('post-area');
            if(!area) return;
            let posts = [];
            ss.forEach(doc => posts.push({id: doc.id, ...doc.data()}));
            posts.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
            area.innerHTML = "";
            posts.forEach(p => {
                const name = p.isEventPost ? "匿名ユーザー" : getNameWithBadge(p.user);
                area.innerHTML += `
                    <div class="post">
                        <div class="post-info"><b>${name}</b></div>
                        <div class="post-body">${linkify(p.text)}</div>
                    </div>`;
            });
        });
        
        if (client && client.remoteUsers.length > 0) {
            document.getElementById('call-status-area').style.display = 'block';
            updateOnlineUsers();
        }
    }

    async function joinCall(channelId) {
        try {
            await client.join(AGORA_APP_ID, channelId, null, currentUserName);
            await db.collection("active_calls").doc(currentUserName).set({ threadId: channelId });
            
            localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
            await client.publish([localAudioTrack]);
            
            document.getElementById('join-btn').style.display = 'none';
            document.getElementById('leave-btn').style.display = 'block';
            document.getElementById('call-status-area').style.display = 'block';
            updateOnlineUsers();
        } catch(err) {
            alert("通話への参加に失敗しました。マイクの許可を確認してください: " + err.message);
        }
    }

    function updateOnlineUsers() {
        const userArea = document.getElementById('online-users');
        if (!userArea) return;
        
        const users = [currentUserName, ...client.remoteUsers.map(u => u.uid)];
        userArea.innerText = users.map(u => currentThreadIsEvent ? '匿名' : getNameWithBadge(u)).join(", ");
    }

    async function leaveCall() {
        if(localAudioTrack){ localAudioTrack.stop(); localAudioTrack.close(); localAudioTrack=null; }
        await client.leave();
        if (currentUserName) {
            await db.collection("active_calls").doc(currentUserName).delete();
        }
        if(document.getElementById('join-btn')) document.getElementById('join-btn').style.display = 'block';
        if(document.getElementById('leave-btn')) document.getElementById('leave-btn').style.display = 'none';
        if(document.getElementById('call-status-area')) document.getElementById('call-status-area').style.display = 'none';
    }

    async function showAdminPage() {
        document.getElementById('root').innerHTML = `
            <div class="nav"><button class="btn-small" onclick="showThreadList()">⬅️ 戻る</button></div>
            <h1>👑 管理画面 (インゲーム版)</h1>
            <p style="font-size:0.85em; color:var(--sub-text); text-align:center;">💡 遠隔専用の管理者パネルからもすべての操作をGUI/CUIで行えます。</p>
            <div class="admin-sec-title">📢 お知らせ（NOTICE）を更新する</div>
            <div class="form-area">
                <textarea id="noticeInput" rows="2" placeholder="広場トップに表示するお知らせ文"></textarea>
                <button onclick="updateNotice()" class="btn-pink">お知らせを更新して反映</button>
            </div>
        `;
    }

    async function updateNotice() {
        const text = document.getElementById("noticeInput").value;
        if(!text.trim()) return alert("お知らせを入力してね");
        await db.collection("system").doc("notice").set({ text: text, updatedBy: currentUserName });
        alert("お知らせを更新しました！");
    }

    async function createThread() {
        const title = document.getElementById("newThreadTitle").value.trim();
        const body = document.getElementById("firstPost").value.trim();
        if(!title || !body) return alert("タイトルと内容を入力してね");
        
        const threadRef = await db.collection("threads").add({ title, creator: currentUserName, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        await db.collection("posts").add({ threadId: threadRef.id, user: currentUserName, text: body, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        alert("コミュニティを開設しました！");
    }

    async function sendReply() {
        const text = document.getElementById("replyText").value.trim();
        if(!text) return alert("文字を入力してね");
        await db.collection("posts").add({ threadId: currentThreadId, user: currentUserName, text, isEventPost: currentThreadIsEvent, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        document.getElementById("replyText").value = "";
    }
</script>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
    const adminSocket = io('http://localhost:3000'); 

    adminSocket.on('server_maintenance_status', (data) => {
        if (data.isMaintenance) {
            let mentScreen = document.getElementById('maintenance-screen');
            if (!mentScreen) {
                mentScreen = document.createElement('div');
                mentScreen.id = 'maintenance-screen';
                mentScreen.style.cssText = 'background:#0a0f0d; color:#39ff14; height:100vh; width:100vw; display:flex; flex-direction:column; justify-content:center; align-items:center; font-family:monospace; text-align:center; position:fixed; top:0; left:0; z-index:999999; padding:20px; box-sizing:border-box;';
                mentScreen.innerHTML = `
                    <h1 style="font-size:3rem; text-shadow:0 0 10px #39ff14; margin:0; letter-spacing: 2px;">⚠️ SYSTEM MAINTENANCE</h1>
                    <p id="ment-msg" style="font-size:1.5rem; color:#fff; margin-top:25px; white-space:pre-wrap; border: 1px dashed #1f3a2b; padding: 15px; background: #121b18; border-radius: 5px; min-width: 300px;"></p>
                `;
                document.body.appendChild(mentScreen);
            }
            document.getElementById('ment-msg').innerText = data.maintenanceMessage;
        } else {
            const screen = document.getElementById('maintenance-screen');
            if (screen) { screen.remove(); }
        }
    });

    adminSocket.on('server_kick_command', (username) => {
        if (currentUserName === username) { 
            alert("管理者に強制キックされました。");
            window.location.href = "about:blank"; 
        }
    });

    adminSocket.on('trigger_firebase_notice', async (txt) => {
        if (!db) return;
        try { await db.collection("system").doc("notice").set({ text: txt, updatedBy: "RemoteAdmin" }); } catch(e) {}
    });

    adminSocket.on('trigger_firebase_event_start', async () => {
        if (!db) return;
        try {
            const title = "【管理者実行イベント匿名雑談所】";
            const threadRef = await db.collection("threads").add({ title, creator: "admin", isEvent: true, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            await db.collection("posts").add({ threadId: threadRef.id, user: "admin", text: "🎉 イベント開始！ここは完全匿名だよ！", isEventPost: true, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        } catch(e) {}
    });

    adminSocket.on('trigger_firebase_event_delete', async () => {
        if (!db) return;
        try {
            const snap = await db.collection("threads").where("title", "==", "【管理者実行イベント匿名雑談所】").get();
            for (const doc of snap.docs) {
                const postsSnap = await db.collection("posts").where("threadId", "==", doc.id).get();
                const batch = db.batch();
                postsSnap.forEach(postDoc => batch.delete(postDoc.ref));
                batch.delete(doc.ref);
                await batch.commit();
            }
        } catch(e) {}
    });

    adminSocket.on('trigger_firebase_accept', async (targetUserId) => {
        if (!db) return;
        try {
            const snap = await db.collection("requests").where("userId", "==", targetUserId).get();
            snap.forEach(doc => { doc.ref.update({ isApproved: true }); });
        } catch(e) {}
    });

    adminSocket.on('trigger_firebase_ban', async (targetUserId) => {
        if (!db) return;
        try {
            const snap = await db.collection("requests").where("userId", "==", targetUserId).get();
            snap.forEach(doc => { doc.ref.update({ isApproved: false }); });
        } catch(e) {}
    });

    adminSocket.on('trigger_firebase_tag', async (data) => {
        if (!db) return;
        try { await db.collection("user_titles").doc(data.username).set({ title: data.tagTitle }); } catch(e) {}
    });

    // 🔍 拡張逆探知：user info [ユーザー名] の実行
    adminSocket.on('request_firebase_user_info', async (username) => {
        if (!db) return;
        try {
            let title = "なし";
            let avatar = "未設定";
            let currentRoom = "ロビー・広場";
            
            const tDoc = await db.collection("user_titles").doc(username).get();
            if(tDoc.exists) title = tDoc.data().title;
            
            const aDoc = await db.collection("avatars").doc(username).get();
            if(aDoc.exists) avatar = aDoc.data().url;
            
            const pDoc = await db.collection("presence").doc(username).get();
            if(pDoc.exists) {
                const thId = pDoc.data().threadId;
                const thDoc = await db.collection("threads").doc(thId).get();
                if(thDoc.exists) currentRoom = `コミュニティ「${thDoc.data().title}」`;
            }
            
            const logMsg = `\n[解析結果: ${username}]\n・称号: ${title}\n・現在地: ${currentRoom}\n・アイコン: ${avatar}\n`;
            adminSocket.emit('relay_to_terminal', logMsg);
        } catch(e) { adminSocket.emit('relay_to_terminal', `❌ ユーザー情報取得失敗: ${e.message}`); }
    });

    // 📋 拡張逆探知：user list の実行
    adminSocket.on('request_firebase_user_list', async () => {
        if (!db) return;
        try {
            const now = Date.now();
            const statusSnap = await db.collection("users_status").get();
            const onlineUsers = new Set();
            statusSnap.forEach(doc => {
                if (doc.data().lastActive && (now - doc.data().lastActive.toMillis() < 120000)) onlineUsers.add(doc.id);
            });

            const reqSnap = await db.collection("requests").get();
            let onlineList = [];
            let approvedList = [];
            let pendingList = [];

            reqSnap.forEach(doc => {
                const u = doc.data().userId;
                if(doc.data().isApproved) {
                    approvedList.push(u);
                    if(onlineUsers.has(u)) onlineList.push(u);
                } else {
                    pendingList.push(u);
                }
            });

            const report = `
\n======= 👥 ACCOUNT STATUS REPORT =======
🟢 【オンライン中のユーザー】 (${onlineList.length}名)
   -> ${onlineList.join(", ") || "なし"}

👑 【登録済みの一般ユーザー】 (${approvedList.length}名)
   -> ${approvedList.join(", ") || "なし"}

⏳ 【新規の承認待ちリスト】 (${pendingList.length}名)
   -> ${pendingList.join(", ") || "なし"}
========================================\n`;
            adminSocket.emit('relay_to_terminal', report);
        } catch(e) { adminSocket.emit('relay_to_terminal', "❌ ユーザーリスト取得失敗"); }
    });

    // 🚨 拡張逆探知：thread delete [スレ名] の実行
    adminSocket.on('trigger_firebase_thread_delete', async (threadTitle) => {
        if (!db) return;
        try {
            const snap = await db.collection("threads").where("title", "==", threadTitle).get();
            if(snap.empty) {
                adminSocket.emit('relay_to_terminal', `❌ 指定された一般スレ「${threadTitle}」が見つかりません。`);
                return;
            }
            let count = 0;
            for (const doc of snap.docs) {
                const postsSnap = await db.collection("posts").where("threadId", "==", doc.id).get();
                const batch = db.batch();
                postsSnap.forEach(postDoc => batch.delete(postDoc.ref));
                batch.delete(doc.ref);
                await batch.commit();
                count++;
            }
            adminSocket.emit('relay_to_terminal', `🟢 データベースから「${threadTitle}」を完全に抹消しました。`);
        } catch(e) {}
    });

    // 🧹 拡張逆探知：post delete [ユーザー名] の実行
    adminSocket.on('trigger_firebase_post_delete', async (username) => {
        if (!db) return;
        try {
            const snap = await db.collection("posts").where("user", "==", username).get();
            if(snap.empty) {
                adminSocket.emit('relay_to_terminal', `❌ 「${username}」による投稿ログが見つかりません。`);
                return;
            }
            const batch = db.batch();
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            adminSocket.emit('relay_to_terminal', `🧹 「${username}」の全書き込みログ (${snap.size}件) を完全消去しました。`);
        } catch(e) {}
    });

    // ⚠️ 拡張逆探知：system reset の実行
    adminSocket.on('trigger_firebase_system_reset', async () => {
        if (!db) return;
        try {
            await db.collection("system").doc("notice").set({ text: "お知らせはありません。", updatedBy: "RESET" });
            const snap = await db.collection("threads").where("title", "==", "【管理者実行イベント匿名雑談所】").get();
            for (const doc of snap.docs) {
                const postsSnap = await db.collection("posts").where("threadId", "==", doc.id).get();
                const batch = db.batch();
                postsSnap.forEach(postDoc => batch.delete(postDoc.ref));
                batch.delete(doc.ref);
                await batch.commit();
            }
            adminSocket.emit('relay_to_terminal', `🟢 Firebase側のシステムリセット処理が成功しました。`);
        } catch(e) {}
    });
</script>
</body>
</html>
