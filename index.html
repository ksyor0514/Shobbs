<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShoBBS - Cloud Push Edition</title>
    <link rel="apple-touch-icon" href="https://chromebookuser0001-cyber.github.io/sho-/shophoto.jpg">
    <link rel="icon" href="https://chromebookuser0001-cyber.github.io/sho-/shophoto.jpg">
    <link rel="manifest" href="data:application/json,{'name':'ShoBBS','short_name':'ShoBBS','start_url':'/','display':'standalone','background_color':'%23060610','theme_color':'%23060610','icons':[{'src':'https://chromebookuser0001-cyber.github.io/sho-/shophoto.jpg','sizes':'192x192','type':'image/jpg'}]}">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="ShoBBS">
    <style>
        :root { 
            --bg: #060610; 
            --card: #101026; 
            --accent: #00f0ff; 
            --pink: #ff007f;
            --green: #39ff14;
            --text: #e2e2ff; 
            --border: rgba(0, 240, 255, 0.25);
            --sub-text: #7c7ca3;
        }
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 650px; background: var(--card); border: 1px solid var(--border); min-height: 95vh; padding: 15px; box-sizing: border-box; border-radius: 24px; }
        h1 { text-align: center; color: var(--accent); letter-spacing: 2px; margin: 10px 0 5px 0; font-size: 1.8em; font-weight: 800; text-shadow: 0 0 8px rgba(0, 240, 255, 0.4); }
        .last-update-tag { text-align: center; font-size: 0.75em; color: var(--sub-text); margin-bottom: 25px; font-weight: bold; letter-spacing: 0.5px; }
        .stories-container { display: flex; gap: 14px; overflow-x: auto; white-space: nowrap; padding: 10px 10px 15px 10px; margin-bottom: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); -webkit-overflow-scrolling: touch; }
        .stories-container::-webkit-scrollbar { height: 4px; }
        .stories-container::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); border-radius: 10px; }
        .story-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75em; color: var(--text); min-width: 60px; max-width: 60px; text-align: center; }
        .story-avatar { width: 52px; height: 52px; border-radius: 50%; background: #1a1a3a; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2em; color: var(--accent); margin-bottom: 6px; border: 2px solid #333; box-sizing: border-box; position: relative; }
        .story-item.online .story-avatar { border: 2px solid transparent; background-image: linear-gradient(#101026, #101026), linear-gradient(135deg, var(--pink), var(--accent)); background-origin: border-box; background-clip: content-box, border-box; box-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }
        .story-item.online .story-avatar::after { content: ""; position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: var(--green); border-radius: 50%; border: 2px solid var(--card); }
        .push-banner { background: rgba(0, 240, 255, 0.05); border: 1px dashed var(--accent); padding: 10px; border-radius: 12px; margin-bottom: 15px; font-size: 0.8em; display: flex; justify-content: space-between; align-items: center; }
        .thread-item { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); padding: 16px; margin-bottom: 12px; cursor: pointer; border-radius: 16px; }
        .thread-header { display: flex; justify-content: space-between; font-size: 0.75em; color: var(--sub-text); margin-bottom: 6px; }
        .form-area { background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 255, 255, 0.05); padding: 16px; margin-bottom: 20px; border-radius: 18px; }
        .notice-area { border: 1px solid var(--pink); background: rgba(255, 0, 127, 0.01); padding: 14px; margin-bottom: 20px; border-radius: 16px; }
        .notice-title { color: var(--pink); font-weight: bold; font-size: 0.9em; margin-bottom: 6px; text-shadow: 0 0 5px var(--pink); }
        input, textarea, select { width: 100%; padding: 12px; margin: 6px 0; background: #090918; color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); box-sizing: border-box; border-radius: 12px; font-size: 15px; outline_none; }
        button { width: 100%; padding: 12px; border: none; background: linear-gradient(90deg, #00c6ff, #0072ff); color: #fff; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-pink { background: linear-gradient(90deg, #ff007f, #ff0055); }
        .post { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06); padding: 14px; margin-bottom: 14px; border-radius: 16px; }
        .post-info { display: flex; align-items: center; gap: 8px; color: var(--accent); font-size: 0.85em; margin-bottom: 8px; }
        .post-avatar-mini { width: 24px; height: 24px; background: #1a1a3a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7em; border: 1px solid var(--accent); }
        .post-body { font-size: 0.95em; color: #fff; }
        .post-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.03); padding-top: 8px;}
        .glow-btn { background: rgba(255, 255, 255, 0.04); border: none; color: var(--sub-text); padding: 5px 14px; font-size: 0.8em; border-radius: 14px; cursor: pointer; font-weight: bold; }
        .glow-btn.liked { color: var(--pink); background: rgba(255, 0, 127, 0.15); box-shadow: 0 0 10px rgba(255, 0, 127, 0.3); }
        .likers-list { font-size: 0.75em; color: var(--sub-text); }
        .nav { display: flex; justify-content: flex-end; margin-bottom: 15px; gap: 6px; }
        .btn-small { width: auto; padding: 5px 12px; font-size: 0.75em; margin: 0; background: rgba(255,255,255,0.05); }
        .del-btn { color: var(--sub-text); cursor: pointer; margin-left: auto; }
        #call-status-area { margin-bottom: 12px; padding: 10px; background: rgba(0, 240, 255, 0.02); border: 1px dashed var(--accent); border-radius: 12px; font-size: 0.85em; display: none; }
        .talkers-count { font-size: 0.8em; color: var(--green); font-weight: bold; margin-top: 4px; display: block;}
        .notice-text { color: #fff; font-size: 0.9em; white-space: pre-wrap; }
    </style>
</head>
<body>
<div id="root" class="container"></div>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.21.0.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
<script>
    const AGORA_APP_ID = "1563871745f642a5a5332fe7ee3ebeba"; 
    const ADMIN_USER_ID = "admin"; 
    const VAPID_KEY = "BMq_8ECrUP5qyo6SEqdhDMiUlIQR8K07bkkb6v2-RtelsJiw6dAeosVW1l3OM6i5kBXblaDYQGtDGA6vvAOB8bc"; 

    // 🕒 最終更新日時（アプデしたときにここを書き換えてね！）
    const LAST_UPDATE_TIME = "2026/06/19 17:40";

    let currentUserName = "";
    let currentThreadId = null;
    let db, client, localAudioTrack, messaging;
    let unsubscribeThreads = null, unsubscribePosts = null, unsubscribePresence = null, unsubscribeMembers = null, unsubscribeNotice = null, unsubscribeCalls = null;
    let keepAliveInterval = null;

    const firebaseConfig = {
        apiKey: "AIzaSyD2-XU5R6upCUgSDJbDz7iSoEQCzrzusLk",
        authDomain: "t1s-sns.firebaseapp.com",
        projectId: "t1s-sns",
        storageBucket: "t1s-sns.appspot.com",
        messagingSenderId: "377338728077",
        appId: "1:377338728077:web:1205ed292e4181869adcc4"
    };

    window.onload = () => {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        
        if (firebase.messaging.isSupported()) {
            try {
                messaging = firebase.messaging();
                const swCode = `
                    importScripts("https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js");
                    importScripts("https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js");
                    firebase.initializeApp(${JSON.stringify(firebaseConfig)});
                    const messaging = firebase.messaging();
                    messaging.onBackgroundMessage((payload) => {
                        self.registration.showNotification(payload.notification.title, {
                            body: payload.notification.body,
                            icon: "https://chromebookuser0001-cyber.github.io/sho-/shophoto.jpg"
                        });
                    });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const blobUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(blobUrl);
            } catch(e) { console.log("Messaging init error ignored."); }
        }

        showLoginPage();
        setupExitEvents();
        setupNotificationTriggers(); 
    };

    function setupExitEvents() {
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "hidden") { goOfflineSync(); } 
            else if (currentUserName) { keepAlive(); if (currentThreadId) updatePresence(currentThreadId); }
        });
        window.addEventListener("beforeunload", () => { goOfflineSync(); });
    }

    function goOfflineSync() {
        if (!currentUserName) return;
        db.collection("users_status").doc(currentUserName).delete();
        db.collection("presence").doc(currentUserName).delete();
        db.collection("active_calls").doc(currentUserName).delete();
    }

    async function requestNotificationPermission() {
        if (!messaging) return alert("このブラウザは通知に対応していません。iPhoneはホーム画面に追加してから開いてね！");
        try {
            const permission = await Notification.requestPermission();
            if (permission === "granted") {
                const token = await messaging.getToken({ vapidKey: VAPID_KEY });
                if (token) {
                    await db.collection("user_tokens").doc(currentUserName).set({ token: token, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    alert("通知設定が完了しました！アプリを閉じても届きます。");
                    if(document.getElementById("push-banner-area")) document.getElementById("push-banner-area").style.display = "none";
                }
            }
        } catch (err) { alert("通知の登録に失敗しました。Webアプリ（ホーム画面追加）のままで使い込もう！"); }
    }

    async function triggerCloudPush(targetUser, title, body) {
        const doc = await db.collection("user_tokens").doc(targetUser).get();
        if (!doc.exists) return;
        const token = doc.data().token;

        await db.collection("push_queue").add({
            toToken: token,
            title: title,
            body: body,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    function setupNotificationTriggers() {
        if (!messaging) return;
        
        messaging.onMessage((payload) => {
            const n = payload.notification;
            new Notification(n.title, { body: n.body, icon: 'https://chromebookuser0001-cyber.github.io/sho-/shophoto.jpg' });
        });

        db.collection("push_queue").orderBy("createdAt", "desc").limit(1).onSnapshot(ss => {
            if (ss.empty || !currentUserName) return;
            db.collection("user_tokens").doc(currentUserName).get().then(myDoc => {
                if(!myDoc.exists) return;
                const myToken = myDoc.data().token;
                ss.forEach(doc => {
                    const data = doc.data();
                    if (data.toToken === myToken && (Date.now() - data.createdAt?.toMillis() < 10000)) {
                        new Notification(data.title, { body: data.body });
                    }
                });
            });
        });
    }

    function showLoginPage() {
        // 🛠️ 変更点: ログイン画面に最終更新タグを追加
        document.getElementById('root').innerHTML = `
            <h1>ShoBBS</h1>
            <div class="last-update-tag">最終更新: ${LAST_UPDATE_TIME}</div>
            <div class="form-area">
                <input type="text" id="loginId" placeholder="ユーザーID">
                <input type="password" id="pinCode" placeholder="PINコード">
                <button onclick="login()">ログイン</button>
            </div>
            <div style="text-align:center; margin-top:25px; border-top:1px solid rgba(255,255,255,0.05); padding-top:15px;">
                <p style="font-size:0.8em; color:var(--sub-text);">【利用申請】</p>
                <input type="text" id="regId" placeholder="希望ユーザーID">
                <input type="password" id="regPin" placeholder="希望PINコード">
                <button onclick="register()" class="btn-small" style="width:100%; margin-top:5px;">アカウント申請</button>
            </div>`;
    }

    async function login() {
        const id = document.getElementById('loginId').value;
        const pin = document.getElementById('pinCode').value;
        const snap = await db.collection("requests").where("userId", "==", id).get();
        if (snap.empty) return alert("登録がありません");
        const data = snap.docs[0].data();
        if (data.pin == pin && data.isApproved) { 
            currentUserName = id; 
            showThreadList(); 
            keepAlive();
            if(keepAliveInterval) clearInterval(keepAliveInterval);
            keepAliveInterval = setInterval(keepAlive, 30000);
        } else { alert("認証待ち または PIN違い"); }
    }

    async function register() {
        const id = document.getElementById('regId').value;
        const pin = document.getElementById('regPin').value;
        if(!id || !pin) return alert("IDとPINを入力してください");
        await db.collection("requests").add({ userId: id, pin: pin, isApproved: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        alert("申請完了！");
    }

    async function keepAlive() {
        if (!currentUserName || document.visibilityState === "hidden") return;
        await db.collection("users_status").doc(currentUserName).set({ lastActive: firebase.firestore.FieldValue.serverTimestamp() });
    }

    async function updatePresence(threadId) {
        if (!currentUserName || document.visibilityState === "hidden") return;
        const ref = db.collection("presence").doc(currentUserName);
        if (threadId) { await ref.set({ threadId, lastSeen: firebase.firestore.FieldValue.serverTimestamp() }); } 
        else { await ref.delete(); }
    }

    async function showThreadList() {
        if(unsubscribeThreads) unsubscribeThreads();
        if(unsubscribePosts) unsubscribePosts();
        if(unsubscribePresence) unsubscribePresence();
        if(unsubscribeMembers) unsubscribeMembers();
        if(unsubscribeNotice) unsubscribeNotice();
        if(unsubscribeCalls) unsubscribeCalls();
        await updatePresence(null);
        currentThreadId = null;
        leaveCall();
        
        let adminBtn = (currentUserName === ADMIN_USER_ID) ? `<button class="btn-small" style="color:var(--pink);" onclick="showAdminPage()">管理</button>` : "";
        let adminNoticeForm = (currentUserName === ADMIN_USER_ID) ? `
            <div style="margin-top:10px; border-top:1px dashed rgba(255,0,127,0.2); padding-top:10px;">
                <textarea id="noticeInput" rows="2" placeholder="管理者用お知らせ入力"></textarea>
                <button onclick="updateNotice()" class="btn-small btn-pink" style="color:#fff;">更新</button>
            </div>` : "";

        let showPushBanner = (window.Notification && Notification.permission !== "granted") ? 'block' : 'none';

        document.getElementById('root').innerHTML = `
            <div class="nav">
                ${adminBtn}
                <button class="btn-small" onclick="location.reload()">ログアウト</button>
            </div>
            
            <div id="push-banner-area" class="push-banner" style="display:${showPushBanner};">
                <span>🔔 閉じていても24時間通知を受け取る？</span>
                <button class="btn-small" style="background:var(--accent); color:#000;" onclick="requestNotificationPermission()">通知をONにする</button>
            </div>

            <div id="stories-area" class="stories-container"></div>
            
            <h1>ShoBBS</h1>
            
            <div class="form-area">
                <input type="text" id="newThreadTitle" placeholder="コミュニティのタイトル（スレタイ）">
                <textarea id="firstPost" placeholder="最初の投稿内容..."></textarea>
                <button onclick="createThread()">コミュニティを作成</button>
            </div>
            <div class="notice-area">
                <div class="notice-title">📢 NOTICE BOARD</div>
                <div id="notice-text-content" class="notice-text">お知らせ読み込み中...</div>
                ${adminNoticeForm}
            </div>
            <div id="list-area">読み込み中...</div>`;
        
        unsubscribeMembers = db.collection("users_status").onSnapshot(statusSnap => {
            const onlineUsers = new Set();
            const now = Date.now();
            statusSnap.forEach(doc => {
                const data = doc.data();
                if (data.lastActive && (now - data.lastActive.toMillis() < 120000)) { onlineUsers.add(doc.id); }
            });

            db.collection("requests").where("isApproved", "==", true).get().then(snap => {
                const area = document.getElementById("stories-area");
                if(!area) return;
                area.innerHTML = "";
                
                const sortedUsers = [];
                snap.forEach(doc => {
                    const uId = doc.data().userId;
                    if(uId === currentUserName) sortedUsers.unshift(uId);
                    else sortedUsers.push(uId);
                });

                sortedUsers.forEach(uId => {
                    const isOnline = onlineUsers.has(uId);
                    const initial = uId.substring(0, 2).toUpperCase();
                    area.innerHTML += `
                        <div class="story-item ${isOnline ? 'online' : ''}">
                            <div class="story-avatar">${initial}</div>
                            <div style="text-overflow: ellipsis; overflow: hidden; width: 60px; white-space: nowrap;">${uId}</div>
                        </div>`;
                });
            });
        });

        let isFirstLoadThread = true;
        unsubscribeThreads = db.collection("threads").orderBy("createdAt", "desc").onSnapshot(ss => {
            const area = document.getElementById('list-area');
            if(!area) return;
            
            if (!isFirstLoadThread) {
                ss.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const d = change.doc.data();
                        if(d.creator !== currentUserName) {
                            db.collection("user_tokens").get().then(tokenSnap => {
                                tokenSnap.forEach(tDoc => {
                                    if(tDoc.id !== currentUserName) triggerCloudPush(tDoc.id, "🚀 新しいコミュニティが誕生！", `${d.creator}: 【${d.title}】`);
                                });
                            });
                        }
                    }
                });
            }
            isFirstLoadThread = false;

            db.collection("active_calls").get().then(callSnap => {
                const threadTalkers = {};
                callSnap.forEach(d => { const cData = d.data(); if(!threadTalkers[cData.threadId]) threadTalkers[cData.threadId] = []; threadTalkers[cData.threadId].push(d.id); });

                db.collection("presence").get().then(ps => {
                    const counts = {};
                    ps.forEach(d => { counts[d.data().threadId] = (counts[d.data().threadId] || 0) + 1; });
                    
                    area.innerHTML = "";
                    ss.forEach(doc => {
                        const count = counts[doc.id] || 0;
                        const talkers = threadTalkers[doc.id] || [];
                        const data = doc.data();
                        const canDelete = (currentUserName === ADMIN_USER_ID || data.creator === currentUserName);
                        const delBtn = canDelete ? `<span class="del-btn" onclick="event.stopPropagation(); deleteThread('${doc.id}')">🗑️</span>` : "";
                        const talkersText = talkers.length > 0 ? `<span class="talkers-count">🗣️ 通話中: ${talkers.join(", ")}</span>` : "";

                        area.innerHTML += `
                            <div class="thread-item" onclick="showThreadDetail('${doc.id}', '${data.title.replace(/'/g, "\\'")}')">
                                <div style="flex-grow: 1;">
                                    <div class="thread-header">
                                        <span>投稿者: ${data.creator || 'unknown'}</span>
                                        <span class="view-count">${count > 0 ? '👀 ' + count + '人が閲覧中' : ''}</span>
                                    </div>
                                    <div style="font-size:1.1em; font-weight:bold; color:#fff; margin:4px 0;">${data.title}</div>
                                    ${talkersText}
                                </div>
                                ${delBtn}
                            </div>`;
                    });
                });
            });
        });

        let isFirstLoadNotice = true;
        unsubscribeNotice = db.collection("system").doc("notice").onSnapshot(doc => {
            const area = document.getElementById("notice-text-content");
            if (!area) return;
            if (doc.exists) { 
                area.innerText = doc.data().text || "現在お知らせはありません。"; 
                if (!isFirstLoadNotice && currentUserName) {
                    db.collection("user_tokens").get().then(tokenSnap => {
                        tokenSnap.forEach(tDoc => {
                            if(tDoc.id !== currentUserName) triggerCloudPush(tDoc.id, "📢 重要なお知らせ更新！", doc.data().text);
                        });
                    });
                }
            }
            isFirstLoadNotice = false;
        });
    }

    async function updateNotice() {
        const text = document.getElementById("noticeInput").value;
        await db.collection("system").doc("notice").set({ text: text, updatedBy: currentUserName });
        alert("お知らせを更新しました！");
    }

    async function deleteThread(threadId) {
        if(!confirm("削除しますか？")) return;
        await db.collection("threads").doc(threadId).delete();
    }

    async function sendInviteNotification(threadTitle) {
        const target = document.getElementById("inviteTargetSelect").value;
        if (target === "none") return alert("メンバーを選んでね");
        
        await triggerCloudPush(target, "🗣️ スレへの招待が届いたぞ！", `${currentUserName}が【${threadTitle}】で君を待ってる！`);
        alert(`${target} のスマホ画面へリアルタイムプッシュ通知を送信しました！`);
    }

    function copyInviteLink() {
        const dummy = document.createElement('input');
        document.body.appendChild(dummy);
        dummy.value = window.location.href;
        dummy.select();
        document.execCommand('copy');
        document.body.removeChild(dummy);
        alert("招待リンクをコピーしました！");
    }

    async function showThreadDetail(id, title) {
        if(unsubscribeThreads) unsubscribeThreads();
        if(unsubscribePosts) unsubscribePosts();
        if(unsubscribeMembers) unsubscribeMembers();
        if(unsubscribeNotice) unsubscribeNotice();
        if(unsubscribeCalls) unsubscribeCalls();
        await updatePresence(id);
        currentThreadId = id;
        
        document.getElementById('root').innerHTML = `
            <div class="nav"><button class="btn-small" onclick="showThreadList()">一覧に戻る</button></div>
            h1 style="font-size:1.3em; text-align:left; color:#fff; text-shadow:none; margin-bottom:5px;">${title}</h1>
            
            <div class="form-area" style="padding:10px; margin-bottom:15px; background:rgba(255, 0, 127, 0.02); border-color:var(--pink);">
                <span style="font-size:0.8em; color:var(--pink); font-weight:bold;">✉️ このスレにメンバーを直接招待</span>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <select id="inviteTargetSelect" style="margin:0; padding:6px; font-size:0.85em;"></select>
                    <button class="btn-small btn-pink" style="color:#fff;" onclick="sendInviteNotification('${title.replace(/'/g, "\\'")}')">通知で呼ぶ</button>
                    <button class="btn-small" style="background:#22c55e; color:#fff;" onclick="copyInviteLink()">LINE用リンク</button>
                </div>
            </div>

            <div id="call-status-area"><div>● 通話中: <span id="online-users" style="color:var(--accent); font-weight:bold;">あなたのみ</span></div></div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button id="join-btn" onclick="joinCall('${id}')">通話に参加</button>
                <button id="leave-btn" style="display:none; background:linear-gradient(90deg, #ef4444, #dc2626);" onclick="leaveCall()">通話を終了</button>
            </div>
            <div class="form-area"><textarea id="replyText" rows="3" placeholder="コメントを投稿..."></textarea><button onclick="sendReply()">コメントを投稿</button></div>
            <div id="post-area"></div>`;

        db.collection("requests").where("isApproved", "==", true).get().then(snap => {
            const select = document.getElementById("inviteTargetSelect");
            if(!select) return;
            select.innerHTML = '<option value="none">メンバーを選択...</option>';
            snap.forEach(doc => {
                const uId = doc.data().userId;
                if(uId !== currentUserName) { select.innerHTML += `<option value="${uId}">${uId}</option>`; }
            });
        });

        unsubscribePosts = db.collection("posts").where("threadId", "==", id).onSnapshot(ss => {
            const area = document.getElementById('post-area');
            if(!area) return;
            let posts = [];
            ss.forEach(doc => posts.push({id: doc.id, ...doc.data()}));
            posts.sort((a, b) => (b.createdAt?.toMillis() || Date.now()) - (a.createdAt?.toMillis() || Date.now()));
            area.innerHTML = "";
            posts.forEach(p => {
                const delBtn = (currentUserName === ADMIN_USER_ID) ? `<span class="del-btn" onclick="deletePost('${p.id}')">×</span>` : "";
                const likes = p.likes || [];
                const isLiked = likes.includes(currentUserName);
                const likersText = likes.length > 0 ? `<span class="likers-list">👀 ${likes.join(", ")} が既読</span>` : "";
                const miniInt = p.user.substring(0,2).toUpperCase();

                area.innerHTML += `
                    <div class="post">
                        <div class="post-info">
                            <div class="post-avatar-mini">${miniInt}</div>
                            <span>${p.user}</span>
                            ${delBtn}
                        </div>
                        <div class="post-body">${p.text}</div>
                        <div class="post-footer">
                            ${likersText}
                            <button class="glow-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${p.id}', ${JSON.stringify(likes).replace(/"/g, '&quot;')})">
                                👀 見たよ (${likes.length})
                            </button>
                        </div>
                    </div>`;
            });
        });
    }

    async function toggleLike(postId, currentLikes) {
        let newLikes = [...currentLikes];
        if (newLikes.includes(currentUserName)) { newLikes = newLikes.filter(u => u !== currentUserName); } 
        else { newLikes.push(currentUserName); }
        await db.collection("posts").doc(postId).update({ likes: newLikes });
    }

    async function deletePost(postId) {
        if(!confirm("削除しますか？")) return;
        await db.collection("posts").doc(postId).delete();
    }

    async function joinCall(channelId) {
        try {
            await client.join(AGORA_APP_ID, channelId, null, currentUserName);
            await db.collection("active_calls").doc(currentUserName).set({ threadId: channelId, startedAt: firebase.firestore.FieldValue.serverTimestamp() });
            client.on("user-published", async (user, mediaType) => {
                await client.subscribe(user, mediaType);
                if (mediaType === "audio") user.audioTrack.play();
                updateOnlineUsers();
            });
            localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
            await client.publish([localAudioTrack]);
            document.getElementById('join-btn').style.display = 'none';
            document.getElementById('leave-btn').style.display = 'block';
            document.getElementById('call-status-area').style.display = 'block';
            updateOnlineUsers();
        } catch (e) { alert("通話に失敗しました"); }
    }

    function updateOnlineUsers() {
        const area = document.getElementById('online-users');
        if(!area) return;
        const allUsers = [currentUserName, ...client.remoteUsers.map(u => u.uid)];
        area.innerText = allUsers.join(", ");
    }

    async function leaveCall() {
        if (localAudioTrack) { localAudioTrack.stop(); localAudioTrack.close(); localAudioTrack = null; }
        await client.leave();
        if (currentUserName) { await db.collection("active_calls").doc(currentUserName).delete(); }
        if(document.getElementById('join-btn')) document.getElementById('join-btn').style.display = 'block';
        if(document.getElementById('leave-btn')) document.getElementById('leave-btn').style.display = 'none';
        if(document.getElementById('call-status-area')) document.getElementById('call-status-area').style.display = 'none';
    }

    async function showAdminPage() {
        document.getElementById('root').innerHTML = `
            <div class="nav"><button class="btn-small" onclick="showThreadList()">戻る</button></div>
            <h1>ユーザー承認</h1>
            <div id="admin-list" class="form-area">読み込み中...</div>`;
            
        db.collection("requests").where("isApproved", "==", false).onSnapshot(ss => {
            const area = document.getElementById('admin-list');
            if(!area) return;
            if(ss.empty) { area.innerHTML = "未承認ユーザーはゼロです。"; return; }
            area.innerHTML = "";
            ss.forEach(doc => {
                const r = doc.data();
                area.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid rgba(255,255,255,0.05);">
                        <span>ID: <b>${r.userId}</b></span>
                        <button class="btn-small" style="background:var(--accent); color:#000;" onclick="approveUser('${doc.id}')">承認する</button>
                    </div>`;
            });
        });
    }

    async function approveUser(docId) {
        await db.collection("requests").doc(docId).update({ isApproved: true });
        alert("承認しました！");
    }

    async function createThread() {
        const title = document.getElementById('newThreadTitle').value;
        const text = document.getElementById('firstPost').value;
        if(!title || !text) return;
        const threadRef = await db.collection("threads").add({ title, creator: currentUserName, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        await db.collection("posts").add({ threadId: threadRef.id, user: currentUserName, text, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        showThreadDetail(threadRef.id, title);
    }

    async function sendReply() {
        const text = document.getElementById('replyText').value;
        if(!text.trim()) return;
        await db.collection("posts").add({ threadId: currentThreadId, user: currentUserName, text, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        document.getElementById('replyText').value = "";
    }
</script>
</body>
</html>
