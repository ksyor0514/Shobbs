<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VoiceHello</title>
    <link class="apple-touch-icon" rel="apple-touch-icon" href="https://chromebookuser0001-cyber.github.io/sho-/shophoto.jpg">
    <link rel="icon" href="https://chromebookuser0001-cyber.github.io/sho-/shophoto.jpg">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="VoiceHello">
    <style>
        :root { 
            --bg: #0b0c16; 
            --card: #15182e; 
            --accent: #00f0ff; 
            --pink: #ff007f;
            --green: #39ff14;
            --text: #e2e2ff; 
            --border: rgba(0, 240, 255, 0.2);
            --sub-text: #7c7ca3;
            --miiverse-orange: #ff9900;
            --purple: #bf55ec;
        }
        :root.light-mode {
            --bg: #f2f4f8;
            --card: #ffffff;
            --accent: #0076ff;
            --pink: #e0006c;
            --green: #00a835;
            --text: #1a1a2e;
            --border: rgba(0, 118, 255, 0.15);
            --sub-text: #6e6e8a;
        }
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; transition: background-color 0.3s, color 0.3s; }
        .container { width: 100%; max-width: 650px; background: var(--card); border: 2px solid var(--border); min-height: 95vh; padding: 15px; box-sizing: border-box; border-radius: 28px; transition: background 0.3s, border-color 0.3s; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        
        h1 { text-align: center; color: var(--accent); letter-spacing: 1px; margin: 5px 0; font-size: 1.6em; font-weight: 900; text-shadow: 0 0 6px rgba(0, 240, 255, 0.2); }
        .last-update-tag { text-align: center; font-size: 0.7em; color: var(--sub-text); margin-bottom: 20px; font-weight: bold; }
        
        .search-bar { display: flex; gap: 6px; margin-bottom: 12px; }
        .search-bar input { margin: 0; }
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; border-bottom: 2px solid rgba(128,128,128,0.1); padding-bottom: 8px; }
        .tab-btn { background: transparent; border: 2px solid transparent; color: var(--sub-text); padding: 6px 16px; border-radius: 20px; font-size: 0.85em; font-weight: bold; width: auto; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 8px rgba(0,240,255,0.3); }
        :root.light-mode .tab-btn.active { color: #fff; }

        .stories-container { display: flex; gap: 14px; overflow-x: auto; white-space: nowrap; padding: 5px 5px 12px 5px; margin-bottom: 15px; border-bottom: 1px solid rgba(128, 128, 128, 0.1); -webkit-overflow-scrolling: touch; }
        .story-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75em; color: var(--text); min-width: 64px; max-width: 64px; text-align: center; cursor: pointer; }
        .story-avatar { width: 48px; height: 48px; border-radius: 50%; background: #1b1e36; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1em; color: var(--accent); margin-bottom: 4px; border: 2px solid #333; box-sizing: border-box; position: relative; background-size: cover; background-position: center; }
        .story-item.online .story-avatar { border: 2px solid transparent; background-image: linear-gradient(var(--card), var(--card)), linear-gradient(135deg, var(--pink), var(--accent)); background-origin: border-box; background-clip: content-box, border-box; }
        .story-item.online .story-avatar::after { content: ""; position: absolute; bottom: 1px; right: 1px; width: 9px; height: 9px; background: var(--green); border-radius: 50%; border: 2px solid var(--card); }
        .user-status-text { font-size: 0.7em; color: var(--pink); max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-style: italic; }

        .thread-item { background: rgba(128, 128, 128, 0.03); border: 2px solid rgba(128, 128, 128, 0.12); padding: 14px; margin-bottom: 12px; cursor: pointer; border-radius: 20px; position: relative; transition: transform 0.15s, border-color 0.15s; display: flex; align-items: center; gap: 12px; }
        .thread-item:hover { transform: translateY(-2px); border-color: var(--accent); }
        .thread-item.pulse-neon { border-color: var(--accent); animation: neonGlow 1.5s infinite alternate; }
        .thread-item.event-th { border-color: var(--purple); box-shadow: 0 0 10px rgba(191, 85, 236, 0.2); }
        @keyframes neonGlow { 0% { box-shadow: 0 0 5px rgba(0, 240, 255, 0.1); } 100% { box-shadow: 0 0 12px rgba(0, 240, 255, 0.3); } }
        .thread-icon-box { width: 44px; height: 44px; background: rgba(0, 240, 255, 0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4em; border: 1px solid rgba(0,240,255,0.2); }
        .thread-main { flex-grow: 1; min-width: 0; }
        .thread-header { display: flex; justify-content: space-between; font-size: 0.75em; color: var(--sub-text); margin-bottom: 3px; }
        
        .form-area { background: rgba(128, 128, 128, 0.02); border: 1px solid rgba(128, 128, 128, 0.1); padding: 14px; margin-bottom: 16px; border-radius: 20px; }
        .notice-area { border: 2px solid var(--pink); background: rgba(255, 0, 127, 0.02); padding: 12px; margin-bottom: 16px; border-radius: 20px; }
        .notice-title { color: var(--pink); font-weight: bold; font-size: 0.85em; margin-bottom: 4px; letter-spacing: 1px; }
        
        input, textarea, select { width: 100%; padding: 11px; margin: 5px 0; background: rgba(0,0,0,0.2); color: var(--text); border: 2px solid rgba(128, 128, 128, 0.15); box-sizing: border-box; border-radius: 14px; font-size: 15px; outline: none; }
        :root.light-mode input, :root.light-mode textarea, :root.light-mode select { background: #fdfdfd; }
        button { width: 100%; padding: 11px; border: none; background: linear-gradient(90deg, #00c6ff, #0072ff); color: #fff; border-radius: 14px; font-weight: bold; cursor: pointer; font-size: 15px; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }
        .btn-pink { background: linear-gradient(90deg, #ff007f, #ff0055); }
        .btn-purple { background: linear-gradient(90deg, #bf55ec, #9b59b6); }
        .btn-danger { background: linear-gradient(90deg, #ef4444, #dc2626) !important; color: white !important; }
        .btn-small { width: auto; padding: 4px 10px; font-size: 0.75em; margin: 0; background: rgba(128,128,128,0.1); color: var(--text); border-radius: 10px; }
        
        .post { background: rgba(128, 128, 128, 0.02); border: 2px solid rgba(128, 128, 128, 0.08); padding: 12px; margin-bottom: 12px; border-radius: 20px; }
        .post-info { display: flex; align-items: center; gap: 8px; color: var(--accent); font-size: 0.8em; margin-bottom: 6px; }
        .post-avatar-mini { width: 24px; height: 24px; background: #1b1e36; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7em; border: 1px solid var(--accent); background-size: cover; background-position: center; }
        .post-body { font-size: 0.95em; color: var(--text); white-space: pre-wrap; word-break: break-all; }
        .post-body a { color: var(--accent); text-decoration: underline; font-weight: bold; }
        .post-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; border-top: 1px solid rgba(128,128,128,0.08); padding-top: 6px;}
        .glow-btn { background: rgba(128, 128, 128, 0.06); border: none; color: var(--sub-text); padding: 4px 12px; font-size: 0.8em; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .glow-btn.liked { color: var(--pink); background: rgba(255, 0, 127, 0.12); }
        .read-count { font-size: 0.75em; color: var(--accent); font-weight: bold; }
        
        .nav { display: flex; justify-content: space-between; margin-bottom: 12px; gap: 6px; align-items: center; }
        .nav-right { display: flex; gap: 6px; }
        .del-btn { color: var(--sub-text); cursor: pointer; margin-left: auto; font-size: 0.9em; }
        .talkers-count { font-size: 0.75em; color: var(--green); font-weight: bold; margin-top: 2px; display: block;}
        
        .admin-item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(128,128,128,0.1); font-size: 0.9em; }
        .admin-sec-title { font-size: 1.1em; font-weight: bold; color: var(--accent); margin: 15px 0 8px 0; border-left: 4px solid var(--accent); padding-left: 8px; }
        .badge-title { background: var(--purple); color: #fff; font-size: 0.8em; padding: 1px 5px; border-radius: 4px; font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>
<div id="root" class="container"></div>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.21.0.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
    const AGORA_APP_ID = "1563871745f642a5a5332fe7ee3ebeba"; 
    const ADMIN_USER_ID = "admin"; 
    const LAST_UPDATE_TIME = "2026/06/20 11:05";
    const SOUND_URL = "https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav";

    let currentUserName = "";
    let currentThreadId = null;
    let currentThreadIsEvent = false;
    let currentThreadTitleBadge = "";
    let db, client, localAudioTrack;
    let unsubscribeThreads = null, unsubscribePosts = null, unsubscribePresence = null, unsubscribeMembers = null, unsubscribeNotice = null, unsubscribeStatuses = null, unsubscribeAvatars = null, unsubscribeReadReceipts = null;
    let keepAliveInterval = null;
    let originalTitle = document.title;
    let blinkInterval = null;
    let userStatuses = {};
    let userAvatars = {};
    let threadReadTimes = {};
    let isDarkMode = true;
    let currentTab = "all"; 
    let searchKeyword = "";

    const firebaseConfig = {
        apiKey: "AIzaSyD2-XU5R6upCUgSDJbDz7iSoEQCzrzusLk",
        authDomain: "t1s-sns.firebaseapp.com",
        projectId: "t1s-sns",
        storageBucket: "t1s-sns.appspot.com",
        messagingSenderId: "377338728077",
        appId: "1:377338728077:web:1205ed292e4181869adcc4"
    };

    window.onload = () => {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        showLoginPage();
        setupExitEvents();
    };

    function toggleTheme() {
        isDarkMode = !isDarkMode;
        const rootEl = document.documentElement;
        const themeBtn = document.getElementById("theme-toggle-btn");
        if (!isDarkMode) {
            rootEl.classList.add("light-mode");
            if (themeBtn) themeBtn.innerText = "☀️ ライトモード";
        } else {
            rootEl.classList.remove("light-mode");
            if (themeBtn) themeBtn.innerText = "🌙 ダークモード";
        }
    }

    function setupExitEvents() {
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "hidden") { 
                goOfflineSync(); 
            } else if (currentUserName) { 
                keepAlive(); 
                stopTitleBlink();
                if (currentThreadId) {
                    updatePresence(currentThreadId);
                    updateReadReceipt(currentThreadId);
                }
            }
        });
        window.addEventListener("beforeunload", () => { goOfflineSync(); });
    }

    function goOfflineSync() {
        if (!currentUserName) return;
        db.collection("users_status").doc(currentUserName).delete();
        db.collection("presence").doc(currentUserName).delete();
        db.collection("active_calls").doc(currentUserName).delete();
    }

    function playNotificationSound() {
        try {
            const audio = new Audio(SOUND_URL);
            audio.volume = 0.5;
            audio.play();
        } catch(e) { console.log("Sound play blocked"); }
    }

    function startTitleBlink() {
        if (document.visibilityState !== "hidden" || blinkInterval) return;
        let isAlt = false;
        blinkInterval = setInterval(() => {
            document.title = isAlt ? "【新着あり！】" + originalTitle : originalTitle;
            isAlt = !isAlt;
        }, 1000);
    }

    function stopTitleBlink() {
        if (blinkInterval) {
            clearInterval(blinkInterval);
            blinkInterval = null;
        }
        document.title = originalTitle;
    }

    function linkify(text) {
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, function(url) {
            return '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + url + '</a>';
        });
    }

    function getNameWithBadge(userId) {
        if (userId === ADMIN_USER_ID) {
            return `${userId}👑`;
        }
        return userId;
    }

    async function updateReadReceipt(threadId) {
        if (!currentUserName || !threadId || document.visibilityState === "hidden") return;
        await db.collection("read_receipts").doc(`${currentThreadId}_${currentUserName}`).set({
            threadId: threadId,
            user: currentUserName,
            lastReadAt: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    function showLoginPage() {
        document.getElementById('root').innerHTML = `
            <h1>VoiceHello</h1>
            <div class="last-update-tag">最終更新: ${LAST_UPDATE_TIME}</div>
            <div id="auth-box" class="form-area">
                <input type="text" id="loginId" placeholder="ユーザーID">
                <input type="password" id="pinCode" placeholder="PINコード">
                <button onclick="login()">ログイン</button>
                <div style="text-align:center; margin-top:15px;">
                    <a href="#" style="color:var(--accent); font-size:0.85em; font-weight:bold; text-decoration:none;" onclick="showRegisterPage()">✨ 新規アカウント申請はこちら</a>
                </div>
            </div>`;
    }

    function showRegisterPage() {
        document.getElementById('root').innerHTML = `
            <h1>VoiceHello</h1>
            <div class="last-update-tag">アカウント申請</div>
            <div class="form-area">
                <input type="text" id="regId" placeholder="希望ユーザーID">
                <input type="password" id="regPin" placeholder="希望PINコード">
                <button onclick="register()" class="btn-pink">利用申請を送信する</button>
                <div style="text-align:center; margin-top:15px;">
                    <a href="#" style="color:var(--sub-text); font-size:0.85em; text-decoration:none;" onclick="showLoginPage()">⬅️ ログイン画面に戻る</a>
                </div>
            </div>`;
    }

    async function login() {
        const id = document.getElementById('loginId').value.trim();
        const pin = document.getElementById('pinCode').value;
        if(!id || !pin) return alert("入力してください");
        const snap = await db.collection("requests").where("userId", "==", id).get();
        if (snap.empty) return alert("アカウントが見つからないか、キック（削除）されました");
        const data = snap.docs[0].data();
        if (data.pin == pin && data.isApproved) { 
            currentUserName = id; 
            showThreadList(); 
            keepAlive();
            if(keepAliveInterval) clearInterval(keepAliveInterval);
            keepAliveInterval = setInterval(keepAlive, 30000);
        } else { alert("承認待ち、またはPINコードが違います"); }
    }

    async function register() {
        const id = document.getElementById('regId').value.trim();
        const pin = document.getElementById('regPin').value;
        if(!id || !pin) return alert("IDとPINを入力してください");
        const snap = await db.collection("requests").where("userId", "==", id).get();
        if(!snap.empty) return alert("このIDはすでに使用されているか、申請中です");
        await db.collection("requests").add({ userId: id, pin: pin, isApproved: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        alert("申請が完了しました！管理者の承認をお待ちください。");
        showLoginPage();
    }

    async function keepAlive() {
        if (!currentUserName || document.visibilityState === "hidden") return;
        await db.collection("users_status").doc(currentUserName).set({ lastActive: firebase.firestore.FieldValue.serverTimestamp() });
    }

    async function updatePresence(threadId) {
        if (!currentUserName || document.visibilityState === "hidden") return;
        const ref = db.collection("presence").doc(currentUserName);
        if (threadId) { await ref.set({ threadId, lastSeen: firebase.firestore.FieldValue.serverTimestamp() }); } 
        else { await ref.delete(); }
    }

    async function setStatus() {
        const text = document.getElementById('myStatusInput').value;
        if(!text.trim()) return;
        await db.collection("statuses").doc(currentUserName).set({
            text: text,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('myStatusInput').value = "";
    }

    async function saveAvatar() {
        const url = document.getElementById('myAvatarInput').value.trim();
        if(!url) return;
        await db.collection("avatars").doc(currentUserName).set({ url: url });
        alert("アイコンを更新しました！");
        document.getElementById('myAvatarInput').value = "";
    }

    function changeTab(tabName) {
        currentTab = tabName;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${tabName}`).classList.add('active');
        triggerThreadRender();
    }

    function searchThreads() {
        searchKeyword = document.getElementById('threadSearchInput').value.toLowerCase().trim();
        triggerThreadRender();
    }

    function triggerThreadRender() {
        if(window.lastThreadSnapshot) {
            renderThreadList(window.lastThreadSnapshot);
        }
    }

    function showThreadList() {
        if(unsubscribeThreads) unsubscribeThreads();
        if(unsubscribePosts) unsubscribePosts();
        if(unsubscribePresence) unsubscribePresence();
        if(unsubscribeMembers) unsubscribeMembers();
        if(unsubscribeNotice) unsubscribeNotice();
        if(unsubscribeStatuses) unsubscribeStatuses();
        if(unsubscribeAvatars) unsubscribeAvatars();
        if(unsubscribeReadReceipts) unsubscribeReadReceipts();
        updatePresence(null);
        currentThreadId = null;
        currentThreadIsEvent = false;
        currentThreadTitleBadge = "";
        leaveCall();
        
        let adminBtn = (currentUserName === ADMIN_USER_ID) ? `<button class="btn-small" style="color:var(--pink);" onclick="showAdminPage()">👑 管理画面</button>` : "";
        let adminNoticeForm = (currentUserName === ADMIN_USER_ID) ? `
            <div style="margin-top:10px; border-top:1px dashed rgba(128,128,128,0.2); padding-top:10px;">
                <textarea id="noticeInput" rows="2" placeholder="管理者用お知らせ入力"></textarea>
                <button onclick="updateNotice()" class="btn-small btn-pink" style="color:#fff;">お知らせを更新</button>
            </div>` : "";

        document.getElementById('root').innerHTML = `
            <div class="nav">
                <button id="theme-toggle-btn" class="btn-small" onclick="toggleTheme()">${isDarkMode ? '🌙 ダークモード' : '☀️ ライトモード'}</button>
                <div class="nav-right">
                    ${adminBtn}
                    <button class="btn-small" onclick="location.reload()">ログアウト</button>
                </div>
            </div>
            <div id="stories-area" class="stories-container"></div>
            
            <div class="form-area" style="padding:12px; margin-bottom:12px;">
                <div class="status-input-container">
                    <input type="text" id="myStatusInput" placeholder="今なにしてる？（一言ステータス）" style="margin:0;">
                    <button onclick="setStatus()" class="btn-small" style="width:auto; white-space:nowrap;">更新</button>
                </div>
                <div class="status-input-container" style="margin-bottom:0; margin-top:6px;">
                    <input type="text" id="myAvatarInput" placeholder="マイアイコン画像URLを設定" style="margin:0;">
                    <button onclick="saveAvatar()" class="btn-small" style="width:auto; white-space:nowrap;">変更</button>
                </div>
            </div>

            <div class="notice-area">
                <div class="notice-title">📢 NOTICE BOARD</div>
                <div id="notice-text-content" class="notice-text">お知らせ読み込み中...</div>
                ${adminNoticeForm}
            </div>

            <h1>コミュニティ広場</h1>
            <div class="search-bar">
                <input type="text" id="threadSearchInput" oninput="searchThreads()" placeholder="🔍 コミュニティを検索...">
            </div>
            <div class="tabs">
                <button id="tab-all" class="tab-btn active" onclick="changeTab('all')">すべて</button>
                <button id="tab-calling" class="tab-btn" onclick="changeTab('calling')">🗣️ 通話中</button>
            </div>
            
            <div id="list-area">コミュニティ読み込み中...</div>

            <div class="form-area" style="margin-top:20px;">
                <div style="font-weight:bold; font-size:0.9em; margin-bottom:5px; color:var(--accent);">🆕 新しいコミュニティ（スレッド）を作る</div>
                <input type="text" id="newThreadTitle" placeholder="コミュニティのタイトル">
                <textarea id="firstPost" rows="2" placeholder="最初のつぶyき内容..."></textarea>
                <button onclick="createThread()">コミュニティを開設する</button>
            </div>`;

        unsubscribeAvatars = db.collection("avatars").onSnapshot(ss => {
            userAvatars = {};
            ss.forEach(doc => { userAvatars[doc.id] = doc.data().url; });
        });

        unsubscribeStatuses = db.collection("statuses").onSnapshot(ss => {
            userStatuses = {};
            const now = Date.now();
            ss.forEach(doc => {
                const data = doc.data();
                if (data.createdAt && (now - data.createdAt.toMillis() < 86400000)) {
                    userStatuses[doc.id] = data.text;
                }
            });
        });

        unsubscribeMembers = db.collection("users_status").onSnapshot(statusSnap => {
            const onlineUsers = new Set();
            const now = Date.now();
            statusSnap.forEach(doc => {
                const data = doc.data();
                if (data.lastActive && (now - data.lastActive.toMillis() < 120000)) { onlineUsers.add(doc.id); }
            });

            db.collection("requests").where("isApproved", "==", true).get().then(snap => {
                const area = document.getElementById("stories-area");
                if(!area) return;
                area.innerHTML = "";
                
                const onlineList = [];
                const offlineList = [];
                
                snap.forEach(doc => {
                    const uId = doc.data().userId;
                    if (onlineUsers.has(uId)) {
                        if (uId === currentUserName) onlineList.unshift(uId);
                        else onlineList.push(uId);
                    } else {
                        if (uId === currentUserName) offlineList.unshift(uId);
                        else offlineList.push(uId);
                    }
                });
                
                const sortedUsers = [...onlineList, ...offlineList];

                sortedUsers.forEach(uId => {
                    const isOnline = onlineUsers.has(uId);
                    const initial = uId.substring(0, 2).toUpperCase();
                    const statusText = userStatuses[uId] ? userStatuses[uId] : "";
                    const avatarUrl = userAvatars[uId] || "";
                    const bgStyle = avatarUrl ? `background-image: url('${avatarUrl}'); color:transparent;` : "";
                    const displayName = getNameWithBadge(uId);
                    
                    area.innerHTML += `
                        <div class="story-item ${isOnline ? 'online' : ''}" onclick="promptDirectStatus('${uId}')">
                            <div class="story-avatar" style="${bgStyle}">${avatarUrl ? '' : initial}</div>
                            <div style="text-overflow: ellipsis; overflow: hidden; width: 64px; white-space: nowrap;">${displayName}</div>
                            <div class="user-status-text">${statusText}</div>
                        </div>`;
                });
            });
        });

        let isFirstLoadThread = true;
        unsubscribeThreads = db.collection("threads").orderBy("createdAt", "desc").onSnapshot(ss => {
            if (!isFirstLoadThread) {
                ss.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const d = change.doc.data();
                        if(d.creator !== currentUserName) {
                            playNotificationSound();
                            startTitleBlink();
                        }
                    }
                });
            }
            isFirstLoadThread = false;
            window.lastThreadSnapshot = ss;
            renderThreadList(ss);
        });

        unsubscribeNotice = db.collection("system").doc("notice").onSnapshot(doc => {
            const area = document.getElementById("notice-text-content");
            if (!area) return;
            if (doc.exists) { area.innerHTML = linkify(doc.data().text || "現在お知らせはありません。"); }
        });
    }

    function renderThreadList(ss) {
        const area = document.getElementById('list-area');
        if(!area) return;

        db.collection("active_calls").get().then(callSnap => {
            const threadTalkers = {};
            callSnap.forEach(d => { 
                const cData = d.data(); 
                if(!threadTalkers[cData.threadId]) threadTalkers[cData.threadId] = []; 
                threadTalkers[cData.threadId].push(d.id); 
            });

            db.collection("presence").get().then(ps => {
                const counts = {};
                ps.forEach(d => { counts[d.data().threadId] = (counts[d.data().threadId] || 0) + 1; });
                
                area.innerHTML = "";
                let hasThreads = false;

                ss.forEach(doc => {
                    const data = doc.data();
                    const count = counts[doc.id] || 0;
                    const talkers = threadTalkers[doc.id] || [];
                    
                    if (currentTab === "calling" && talkers.length === 0) return;
                    if (searchKeyword && !data.title.toLowerCase().includes(searchKeyword)) return;

                    hasThreads = true;
                    const canDelete = (currentUserName === ADMIN_USER_ID || data.creator === currentUserName);
                    const delBtn = canDelete ? `<span class="del-btn" onclick="event.stopPropagation(); deleteThread('${doc.id}')">🗑️</span>` : "";
                    
                    const isEventThread = data.isEvent === true;
                    const dynamicTalkers = talkers.map(tUid => isEventThread ? "匿名ユーザー" : getNameWithBadge(tUid));
                    const talkersText = talkers.length > 0 ? `<span class="talkers-count">🗣️ ${dynamicTalkers.join(", ")} が通話中</span>` : "";
                    
                    let cardClasses = 'thread-item';
                    if (talkers.length > 0) cardClasses += ' pulse-neon';
                    if (isEventThread) cardClasses += ' event-th';

                    const iconStr = isEventThread ? "🤫" : "💬";
                    const creatorDisplayName = isEventThread ? "管理者イベント" : getNameWithBadge(data.creator || 'unknown');
                    const badgeMarkup = isEventThread ? `<span class="badge-title">期間限定イベント</span>` : "";

                    area.innerHTML += `
                        <div class="${cardClasses}" onclick="showThreadDetail('${doc.id}', '${data.title.replace(/'/g, "\\'")}', ${isEventThread}, '${(data.eventBadge || "").replace(/'/g, "\\'")}')">
                            <div class="thread-icon-box">${iconStr}</div>
                            <div class="thread-main">
                                <div class="thread-header">
                                    <span>配信元: ${creatorDisplayName} ${badgeMarkup}</span>
                                    <span>${count > 0 ? '👀 ' + count + '人' : ''}</span>
                                </div>
                                <div style="font-size:1.05em; font-weight:bold; color:var(--text);">${data.title}</div>
                                ${talkersText}
                            </div>
                            ${delBtn}
                        </div>`;
                });

                if(!hasThreads) {
                    area.innerHTML = `<div style="text-align:center; padding:20px; color:var(--sub-text); font-size:0.9em;">該当するコミュニティがありません。</div>`;
                }
            });
        });
    }

    function promptDirectStatus(uId) {
        if(userStatuses[uId]) {
            const name = getNameWithBadge(uId);
            alert(`${name} のステータス:\n「${userStatuses[uId]}」`);
        }
    }

    async function updateNotice() {
        const text = document.getElementById("noticeInput").value;
        await db.collection("system").doc("notice").set({ text: text, updatedBy: currentUserName });
        alert("お知らせを更新しました！");
    }

    async function deleteThread(threadId) {
        if(!confirm("このコミュニティを削除しますか？")) return;
        await db.collection("threads").doc(threadId).delete();
        triggerThreadRender();
    }

    async function showThreadDetail(id, title, isEvent = false, eventBadge = "") {
        if(unsubscribeThreads) unsubscribeThreads();
        if(unsubscribePosts) unsubscribePosts();
        if(unsubscribeMembers) unsubscribeMembers();
        if(unsubscribeNotice) unsubscribeNotice();
        if(unsubscribeStatuses) unsubscribeStatuses();
        if(unsubscribeReadReceipts) unsubscribeReadReceipts();
        
        await updatePresence(id);
        currentThreadId = id;
        currentThreadIsEvent = isEvent;
        currentThreadTitleBadge = eventBadge;
        await updateReadReceipt(id);
        
        const eventAlertArea = isEvent ? `
            <div style="background:rgba(191, 85, 236, 0.15); border: 2px solid var(--purple); padding:10px; border-radius:15px; margin-bottom:12px; font-size:0.85em; text-align:center; font-weight:bold; color:#fff;">
                🤫 ここは完全匿名イベント会場です！誰が書いたかは一切秘密になります。<br>発言すると限定称号【${eventBadge}】が付与されます！
            </div>
        ` : '';

        document.getElementById('root').innerHTML = `
            <div class="nav">
                <button id="theme-toggle-btn" class="btn-small" onclick="toggleTheme()">${isDarkMode ? '🌙 ダークモード' : '☀️ ライトモード'}</button>
                <button class="btn-small" onclick="showThreadList()">コミュニティ一覧に戻る</button>
            </div>
            ${eventAlertArea}
            <h1 style="font-size:1.25em; text-align:left; color:var(--text); text-shadow:none; margin-bottom:5px;">${title}</h1>
            
            <div id="call-status-area" style="margin-bottom:10px; padding:10px; background:rgba(0, 240, 255, 0.02); border:1px dashed var(--accent); border-radius:12px; font-size:0.85em; display:none;">
                <div>● 通話中のメンバー: <span id="online-users" style="color:var(--accent); font-weight:bold;">あなたのみ</span></div>
            </div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button id="join-btn" onclick="joinCall('${id}')">🔊 通話に参加</button>
                <button id="leave-btn" style="display:none; background:linear-gradient(90deg, #ef4444, #dc2626);" onclick="leaveCall()">🛑 通話を終了</button>
            </div>
            <div class="form-area">
                <textarea id="replyText" rows="3" placeholder="ここにコメントを書き込む..."></textarea>
                <button onclick="sendReply()">コメントを投稿する</button>
            </div>
            <div id="post-area"></div>`;

        unsubscribeReadReceipts = db.collection("read_receipts").where("threadId", "==", id).onSnapshot(ss => {
            threadReadTimes = {};
            ss.forEach(doc => {
                const d = doc.data();
                if(d.lastReadAt) {
                    threadReadTimes[d.user] = d.lastReadAt.toMillis();
                }
            });
            renderPosts(id);
        });

        let isFirstLoadPost = true;
        unsubscribePosts = db.collection("posts").where("threadId", "==", id).onSnapshot(ss => {
            if (!isFirstLoadPost) {
                ss.docChanges().forEach(change => {
                    if (change.type === "added") {
                        const pData = change.doc.data();
                        if (pData.user !== currentUserName) {
                            playNotificationSound();
                            startTitleBlink();
                            updateReadReceipt(id);
                        }
                    }
                });
            }
            isFirstLoadPost = false;
            renderPosts(id, ss);
        });
    }

    function renderPosts(threadId, postSnapshot) {
        const area = document.getElementById('post-area');
        if(!area) return;

        const render = (snapshot) => {
            let posts = [];
            snapshot.forEach(doc => posts.push({id: doc.id, ...doc.data()}));
            posts.sort((a, b) => (b.createdAt?.toMillis() || Date.now()) - (a.createdAt?.toMillis() || Date.now()));
            area.innerHTML = "";
            
            posts.forEach(p => {
                const isEvPost = p.isEventPost === true;
                const delBtn = (currentUserName === ADMIN_USER_ID || (!isEvPost && p.user === currentUserName)) ? `<span class="del-btn" onclick="deletePost('${p.id}')">×</span>` : "";
                const likes = p.likes || [];
                const isLiked = likes.includes(currentUserName);
                
                let userDisplayName = isEvPost ? "匿名ユーザー" : getNameWithBadge(p.user);
                if (isEvPost && p.assignedBadge) {
                    userDisplayName += `<span class="badge-title">${p.assignedBadge}</span>`;
                }
                
                const avatarUrl = isEvPost ? "" : (userAvatars[p.user] || "");
                const miniInt = isEvPost ? "👤" : p.user.substring(0,2).toUpperCase();
                const bgStyle = avatarUrl ? `background-image: url('${avatarUrl}'); color:transparent;` : "";

                let readCount = 0;
                const pTime = p.createdAt ? p.createdAt.toMillis() : Date.now();
                Object.keys(threadReadTimes).forEach(u => {
                    if(u !== p.user && threadReadTimes[u] >= pTime) {
                        readCount++;
                    }
                });
                const readReceiptText = readCount > 0 ? `<span class="read-count">既読 ${readCount}</span>` : "";

                area.innerHTML += `
                    <div class="post" style="${isEvPost ? 'border-color: rgba(191,85,236,0.2); background: rgba(191,85,236,0.01);' : ''}">
                        <div class="post-info" style="${isEvPost ? 'color: var(--purple);' : ''}">
                            <div class="post-avatar-mini" style="${isEvPost ? 'border-color:var(--purple); color:var(--purple); background:none;' : bgStyle}">${isEvPost ? '👤' : (avatarUrl ? '' : miniInt)}</div>
                            <span>${userDisplayName}</span>
                            ${delBtn}
                        </div>
                        <div class="post-body">${linkify(p.text)}</div>
                        <div class="post-footer">
                            <div>${readReceiptText}</div>
                            <button class="glow-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${p.id}', ${JSON.stringify(likes).replace(/"/g, '&quot;')})">
                                ❤️ (${likes.length})
                            </button>
                        </div>
                    </div>`;
            });
        };

        if (postSnapshot) {
            window.lastPostSnapshot = postSnapshot;
            render(postSnapshot);
        } else if (window.lastPostSnapshot) {
            render(window.lastPostSnapshot);
        }
    }

    async function toggleLike(postId, currentLikes) {
        let newLikes = [...currentLikes];
        if (newLikes.includes(currentUserName)) { newLikes = newLikes.filter(u => u !== currentUserName); } 
        else { newLikes.push(currentUserName); }
        await db.collection("posts").doc(postId).update({ likes: newLikes });
    }

    async function deletePost(postId) {
        if(!confirm("削除しますか？")) return;
        await db.collection("posts").doc(postId).delete();
    }

    async function joinCall(channelId) {
        try {
            await client.join(AGORA_APP_ID, channelId, null, currentUserName);
            await db.collection("active_calls").doc(currentUserName).set({ threadId: channelId, startedAt: firebase.firestore.FieldValue.serverTimestamp() });
            client.on("user-published", async (user, mediaType) => {
                await client.subscribe(user, mediaType);
                if (mediaType === "audio") user.audioTrack.play();
                updateOnlineUsers();
            });
            localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
            await client.publish([localAudioTrack]);
            document.getElementById('join-btn').style.display = 'none';
            document.getElementById('leave-btn').style.display = 'block';
            document.getElementById('call-status-area').style.display = 'block';
            updateOnlineUsers();
        } catch (e) { alert("通話に失敗しました"); }
    }

    function updateOnlineUsers() {
        const area = document.getElementById('online-users');
        if(!area) return;
        const allUsers = [currentUserName, ...client.remoteUsers.map(u => u.uid)];
        const mappedUsers = allUsers.map(uid => currentThreadIsEvent ? "匿名ユーザー" : getNameWithBadge(uid));
        area.innerText = mappedUsers.join(", ");
    }

    async function leaveCall() {
        if (localAudioTrack) { localAudioTrack.stop(); localAudioTrack.close(); localAudioTrack = null; }
        await client.leave();
        if (currentUserName) { await db.collection("active_calls").doc(currentUserName).delete(); }
        if(document.getElementById('join-btn')) document.getElementById('join-btn').style.display = 'block';
        if(document.getElementById('leave-btn')) document.getElementById('leave-btn').style.display = 'none';
        if(document.getElementById('call-status-area')) document.getElementById('call-status-area').style.display = 'none';
    }

    async function showAdminPage() {
        if (currentUserName !== ADMIN_USER_ID) return showThreadList();
        
        document.getElementById('root').innerHTML = `
            <div class="nav"><button class="btn-small" onclick="showThreadList()">⬅️ コミュニティに戻る</button></div>
            <h1>👑 総合管理システム</h1>
            
            <div class="admin-sec-title">🎉 管理者イベント・称号発行エンジン</div>
            <div class="form-area">
                <div style="font-size:0.85em; color:var(--sub-text); margin-bottom:8px;">
                    イベントを発動すると、指定の名前<b>【管理者実行イベント匿名雑談所】</b>で完全匿名スレッドが立ち上がります。
                </div>
                <input type="text" id="eventBadgeInput" placeholder="このイベント限定で配る称号 (例: 夜更かしの神, エリート)">
                <button onclick="startAdminEvent()" class="btn-purple">⚡ 匿名イベントを実行する</button>
            </div>

            <div class="admin-sec-title">👤 利用申請・登録ユーザー一覧</div>
            <div id="admin-user-list" class="form-area" style="max-height: 200px; overflow-y: auto;">読み込み中...</div>

            <div class="admin-sec-title">💬 全コミュニティ（スレッド）管理</div>
            <div id="admin-thread-list" class="form-area" style="max-height: 200px; overflow-y: auto;">読み込み中...</div>`;
            
        db.collection("requests").orderBy("createdAt", "desc").onSnapshot(ss => {
            const area = document.getElementById('admin-user-list');
            if(!area) return;
            if(ss.empty) { area.innerHTML = "ユーザーデータがありません。"; return; }
            area.innerHTML = "";
            ss.forEach(doc => {
                const r = doc.data();
                let actionBtn = "";
                if (!r.isApproved) {
                    actionBtn = `<button class="btn-small" style="background:var(--green); color:#000;" onclick="approveUser('${doc.id}')">承認</button>`;
                } else {
                    actionBtn = `<button class="btn-small btn-danger" onclick="kickUser('${doc.id}', '${r.userId}')">キック(BAN)</button>`;
                }
                const statusTag = r.isApproved ? `<span style="color:var(--green);">[公認]</span>` : `<span style="color:var(--miiverse-orange);">[未承]</span>`;
                const userDisplayName = getNameWithBadge(r.userId);
                area.innerHTML += `
                    <div class="admin-item-row">
                        <span>${statusTag} <b>${userDisplayName}</b></span>
                        <div>${actionBtn}</div>
                    </div>`;
            });
        });

        db.collection("threads").orderBy("createdAt", "desc").onSnapshot(ss => {
            const area = document.getElementById('admin-thread-list');
            if(!area) return;
            if(ss.empty) { area.innerHTML = "コミュニティはありません。"; return; }
            area.innerHTML = "";
            ss.forEach(doc => {
                const t = doc.data();
                const creatorDisplayName = t.isEvent ? "管理者イベント" : getNameWithBadge(t.creator);
                area.innerHTML += `
                    <div class="admin-item-row">
                        <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:70%;"><b>${t.title}</b> <small style="color:var(--sub-text);">by ${creatorDisplayName}</small></span>
                        <button class="btn-small btn-danger" onclick="adminDeleteThread('${doc.id}')">強制削除</button>
                    </div>`;
            });
        });
    }

    async function startAdminEvent() {
        const badge = document.getElementById("eventBadgeInput").value.trim();
        if(!badge) return alert("このイベントで獲得できる称号を入力してください！");
        
        const fixedTitle = "【管理者実行イベント匿名雑談所】";
        
        if(!confirm(`タイトル: ${fixedTitle}\n称号: 【${badge}】\nでイベント用の匿名スレを生成しますか？`)) return;
        
        const threadRef = await db.collection("threads").add({
            title: fixedTitle,
            creator: currentUserName,
            isEvent: true,
            eventBadge: badge,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        await db.collection("posts").add({
            threadId: threadRef.id,
            user: currentUserName,
            text: `🎉 管理者イベントが開始されました！ここでの発言はすべて匿名となり、特別称号【${badge}】が付与されます！みんな集まれー！`,
            isEventPost: true,
            assignedBadge: badge,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        alert("イベントスレッドを作成しました！広場に公開されています。");
        showThreadList();
    }

    async function approveUser(docId) {
        await db.collection("requests").doc(docId).update({ isApproved: true });
        alert("ユーザーを承認しました！");
    }

    async function kickUser(docId, userId) {
        if(!confirm(`ユーザー「${userId}」を本当にキック（アカウント削除・BAN）しますか？\nログインできなくなります。`)) return;
        await db.collection("requests").doc(docId).delete();
        await db.collection("users_status").doc(userId).delete();
        await db.collection("statuses").doc(userId).delete();
        await db.collection("avatars").doc(userId).delete();
        alert(`ユーザー「${userId}」を追放しました。`);
    }

    async function adminDeleteThread(threadId) {
        if(!confirm("管理権限でこのコミュニティを強制削除しますか？")) return;
        await db.collection("threads").doc(threadId).delete();
        alert("コミュニティを削除しました。");
    }

    async function createThread() {
        const title = document.getElementById('newThreadTitle').value.trim();
        const text = document.getElementById('firstPost').value.trim();
        if(!title || !text) return alert("タイトルと言葉を入力してね");
        const threadRef = await db.collection("threads").add({ title, creator: currentUserName, isEvent: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        await db.collection("posts").add({ threadId: threadRef.id, user: currentUserName, text, isEventPost: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        showThreadDetail(threadRef.id, title, false);
    }

    async function sendReply() {
        const text = document.getElementById('replyText').value;
        if(!text.trim()) return;
        
        await db.collection("posts").add({ 
            threadId: currentThreadId, 
            user: currentUserName, 
            text: text, 
            isEventPost: currentThreadIsEvent,
            assignedBadge: currentThreadIsEvent ? currentThreadTitleBadge : "",
            createdAt: firebase.firestore.FieldValue.serverTimestamp() 
        });
        
        document.getElementById('replyText').value = "";
        await updateReadReceipt(currentThreadId);
    }
</script>
</body>
</html>
