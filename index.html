<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShoBBS</title>
    <link rel="apple-touch-icon" href="https://chromebookuser0001-cyber.github.io/sho-/shophoto.jpg">
    <link rel="icon" href="https://chromebookuser0001-cyber.github.io/sho-/shophoto.jpg">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="ShoBBS">
    <style>
        :root { --bg: #0a0f1a; --card: #111827; --accent: #22d3ee; --text: #cbd5e1; --border: rgba(34, 211, 238, 0.2); --sub-text: #94a3b8; --admin-color: #f87171; --online: #10b981; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; line-height: 1.5; }
        .container { width: 100%; max-width: 700px; background: var(--card); border: 1px solid var(--border); min-height: 90vh; padding: 24px; box-sizing: border-box; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: var(--accent); letter-spacing: 4px; margin-bottom: 24px; font-size: 1.8em; }
        .thread-item { padding: 18px; border: 1px solid var(--border); margin-bottom: 12px; cursor: pointer; transition: 0.2s; background: rgba(255,255,255,0.02); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .thread-item:hover { border-color: var(--accent); background: rgba(34, 211, 238, 0.05); }
        .form-area { background: rgba(0,0,0,0.2); border: 1px solid var(--border); padding: 18px; margin-bottom: 24px; border-radius: 8px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #0f172a; color: #fff; border: 1px solid #334155; box-sizing: border-box; border-radius: 6px; font-size: 16px; outline: none; }
        button { width: 100%; padding: 12px; border: 1px solid var(--accent); background: transparent; color: var(--accent); border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 8px; }
        button:hover { background: var(--accent); color: #0f172a; }
        .post { border-left: 3px solid var(--accent); padding: 12px 16px; margin-bottom: 16px; background: rgba(255,255,255,0.03); border-radius: 0 8px 8px 0; position: relative; }
        .post-info { color: var(--sub-text); font-size: 0.8em; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .nav { display: flex; justify-content: flex-end; margin-bottom: 15px; gap: 10px; flex-wrap: wrap; }
        .btn-small { width: auto; padding: 6px 12px; font-size: 0.75em; margin: 0; }
        .admin-btn { border-color: var(--admin-color); color: var(--admin-color); }
        .del-btn { color: var(--admin-color); cursor: pointer; font-weight: bold; padding: 0 5px; margin-left: 10px; }
        #call-status-area { margin-bottom: 15px; padding: 12px; background: rgba(34, 211, 238, 0.05); border: 1px dashed var(--border); border-radius: 8px; font-size: 0.85em; display: none; }
        .view-count { font-size: 0.8em; color: var(--accent); opacity: 0.8; }
        .member-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #334155; }
        .status-online { color: var(--online); font-weight: bold; }
        .status-offline { color: var(--sub-text); }
    </style>
</head>
<body>
<div id="root" class="container"></div>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.21.0.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
    const AGORA_APP_ID = "1563871745f642a5a5332fe7ee3ebeba"; 
    const ADMIN_USER_ID = "admin"; 
    let currentUserName = "";
    let currentThreadId = null;
    let db, client, localAudioTrack;
    let unsubscribeThreads = null, unsubscribePosts = null, unsubscribePresence = null, unsubscribeMembers = null;
    let keepAliveInterval = null;

    const firebaseConfig = {
        apiKey: "AIzaSyD2-XU5R6upCUgSDJbDz7iSoEQCzrzusLk",
        authDomain: "t1s-sns.firebaseapp.com",
        projectId: "t1s-sns",
        storageBucket: "t1s-sns.appspot.com",
        messagingSenderId: "377338728077",
        appId: "1:377338728077:web:1205ed292e4181869adcc4"
    };

    window.onload = () => {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        showLoginPage();
        setupExitEvents(); // ★離脱検知イベントを設定
    };

    // ★ 画面を閉じたり裏に回した時の処理
    function setupExitEvents() {
        // タブが非表示になったり閉じられたりしたとき
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "hidden") {
                goOfflineSync();
            } else if (currentUserName) {
                keepAlive(); // 戻ってきたらオンライン再開
                if (currentThreadId) updatePresence(currentThreadId);
            }
        });
        // ページが完全に閉じられるとき
        window.addEventListener("beforeunload", () => {
            goOfflineSync();
        });
    }

    // 完全にオフライン状態にする（同期処理）
    function goOfflineSync() {
        if (!currentUserName) return;
        // ユーザーのステータスを即座に消去（または過去の時間にしてオフラインにする）
        db.collection("users_status").doc(currentUserName).delete();
        db.collection("presence").doc(currentUserName).delete();
    }

    function showLoginPage() {
        document.getElementById('root').innerHTML = `<h1>ShoBBS</h1><div class="form-area"><input type="text" id="loginId" placeholder="ユーザーID"><input type="password" id="pinCode" placeholder="PINコード"><button onclick="login()">ログイン</button></div><div style="text-align:center;"><input type="text" id="regId" placeholder="新規ID"><input type="password" id="regPin" placeholder="新規PIN"><button onclick="register()" class="btn-small">利用申請を送る</button></div>`;
    }

    async function login() {
        const id = document.getElementById('loginId').value;
        const pin = document.getElementById('pinCode').value;
        const snap = await db.collection("requests").where("userId", "==", id).get();
        if (snap.empty) return alert("登録がありません");
        const data = snap.docs[0].data();
        if (data.pin == pin && data.isApproved) { 
            currentUserName = id; 
            showThreadList(); 
            keepAlive();
            if(keepAliveInterval) clearInterval(keepAliveInterval);
            keepAliveInterval = setInterval(keepAlive, 30000);
        } else { alert("認証待ち または PIN違い"); }
    }

    async function register() {
        const id = document.getElementById('regId').value;
        const pin = document.getElementById('regPin').value;
        if(!id || !pin) return;
        await db.collection("requests").add({ userId: id, pin: pin, isApproved: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        alert("申請しました。adminの承認を待ってください。");
    }

    async function keepAlive() {
        if (!currentUserName || document.visibilityState === "hidden") return;
        await db.collection("users_status").doc(currentUserName).set({
            lastActive: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    async function updatePresence(threadId) {
        if (!currentUserName || document.visibilityState === "hidden") return;
        const ref = db.collection("presence").doc(currentUserName);
        if (threadId) {
            await ref.set({ threadId, lastSeen: firebase.firestore.FieldValue.serverTimestamp() });
        } else {
            await ref.delete();
        }
    }

    async function showThreadList() {
        if(unsubscribeThreads) unsubscribeThreads();
        if(unsubscribePosts) unsubscribePosts();
        if(unsubscribePresence) unsubscribePresence();
        if(unsubscribeMembers) unsubscribeMembers();
        await updatePresence(null);
        currentThreadId = null;
        leaveCall();
        
        let adminBtn = (currentUserName === ADMIN_USER_ID) ? `<button class="btn-small admin-btn" onclick="showAdminPage()">管理画面</button>` : "";
        document.getElementById('root').innerHTML = `
            <div class="nav">
                <button class="btn-small" onclick="showMembersPage()">メンバー一覧</button>
                ${adminBtn}
                <button class="btn-small" onclick="location.reload()">ログアウト</button>
            </div>
            <h1>ShoBBS</h1>
            <div class="form-area">
                <input type="text" id="newThreadTitle" placeholder="スレタイ">
                <textarea id="firstPost" placeholder="本文"></textarea>
                <button onclick="createThread()">新規スレッド</button>
            </div>
            <div id="list-area">更新中...</div>`;
        
        unsubscribePresence = db.collection("presence").onSnapshot(ps => {
            const counts = {};
            ps.forEach(d => { counts[d.data().threadId] = (counts[d.data().threadId] || 0) + 1; });
            
            unsubscribeThreads = db.collection("threads").orderBy("createdAt", "desc").onSnapshot(ss => {
                const area = document.getElementById('list-area');
                if(!area) return;
                area.innerHTML = "";
                ss.forEach(doc => {
                    const count = counts[doc.id] || 0;
                    const data = doc.data();
                    const canDelete = (currentUserName === ADMIN_USER_ID || data.creator === currentUserName);
                    const delBtn = canDelete ? `<span class="del-btn" onclick="event.stopPropagation(); deleteThread('${doc.id}')">🗑️</span>` : "";
                    
                    area.innerHTML += `
                        <div class="thread-item" onclick="showThreadDetail('${doc.id}', '${data.title.replace(/'/g, "\\'")}')">
                            <div>
                                <span>${data.title}</span>
                                <span style="font-size:0.7em; color:var(--sub-text); margin-left:8px;">by ${data.creator || 'unknown'}</span>
                            </div>
                            <div>
                                <span class="view-count">${count > 0 ? '👀' + count : ''}</span>
                                ${delBtn}
                            </div>
                        </div>`;
                });
            });
        });
    }

    async function deleteThread(threadId) {
        if(!confirm("このスレッドと、スレ内のすべての投稿を削除しますか？")) return;
        await db.collection("threads").doc(threadId).delete();
        const postsSnap = await db.collection("posts").where("threadId", "==", threadId).get();
        const batch = db.batch();
        postsSnap.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
        alert("スレッドを削除しました");
    }

    async function showThreadDetail(id, title) {
        if(unsubscribeThreads) unsubscribeThreads();
        if(unsubscribePosts) unsubscribePosts();
        if(unsubscribeMembers) unsubscribeMembers();
        await updatePresence(id);
        currentThreadId = id;
        
        document.getElementById('root').innerHTML = `
            <div class="nav"><button class="btn-small" onclick="showThreadList()">戻る</button></div>
            <h1 style="font-size:1.2em; border:none; margin-bottom:10px;">${title}</h1>
            <div id="call-status-area"><div>● 通話中: <span id="online-users" style="color:var(--accent); font-weight:bold;">あなたのみ</span></div></div>
            <div style="display:flex; gap:10px; margin-bottom:20px;"><button id="join-btn" onclick="joinCall('${id}')">通話に参加</button><button id="leave-btn" style="display:none; border-color:#f87171; color:#f87171;" onclick="leaveCall()">通話を終了</button></div>
            <div class="form-area"><textarea id="replyText" rows="3" placeholder="コメントを書く"></textarea><button onclick="sendReply()">書き込む</button></div>
            <div id="post-area"></div>`;

        unsubscribePosts = db.collection("posts").where("threadId", "==", id).onSnapshot(ss => {
            const area = document.getElementById('post-area');
            if(!area) return;
            let posts = [];
            ss.forEach(doc => posts.push({id: doc.id, ...doc.data()}));
            posts.sort((a, b) => (b.createdAt?.toMillis() || Date.now()) - (a.createdAt?.toMillis() || Date.now()));
            area.innerHTML = "";
            posts.forEach(p => {
                const delBtn = (currentUserName === ADMIN_USER_ID) ? `<span class="del-btn" onclick="deletePost('${p.id}')">×</span>` : "";
                area.innerHTML += `<div class="post"><div class="post-info"><span>${p.user}</span>${delBtn}</div><div class="post-body">${p.text}</div></div>`;
            });
        });
    }

    async function deletePost(postId) {
        if(!confirm("この投稿を削除しますか？")) return;
        await db.collection("posts").doc(postId).delete();
    }

    async function showMembersPage() {
        if(unsubscribeThreads) unsubscribeThreads();
        if(unsubscribePosts) unsubscribePosts();
        if(unsubscribeMembers) unsubscribeMembers();
        
        document.getElementById('root').innerHTML = `
            <div class="nav"><button class="btn-small" onclick="showThreadList()">戻る</button></div>
            <h1>メンバー一覧</h1>
            <div id="member-list-area" class="form-area">読み込み中...</div>`;

        unsubscribeMembers = db.collection("users_status").onSnapshot(statusSnap => {
            const onlineUsers = {};
            const now = Date.now();
            statusSnap.forEach(doc => {
                const data = doc.data();
                if (data.lastActive) {
                    const diff = now - data.lastActive.toMillis();
                    if (diff < 120000) onlineUsers[doc.id] = true;
                }
            });

            db.collection("requests").where("isApproved", "==", true).get().then(snap => {
                const area = document.getElementById('member-list-area');
                if(!area) return;
                area.innerHTML = "";
                snap.forEach(doc => {
                    const uId = doc.data().userId;
                    const isOnline = onlineUsers[uId] || false;
                    const statusText = isOnline ? `<span class="status-online">🟢 オンライン</span>` : `<span class="status-offline">⚫ オフライン</span>`;
                    area.innerHTML += `
                        <div class="member-item">
                            <span><b>${uId}</b> ${uId === ADMIN_USER_ID ? '<span style="color:var(--admin-color); font-size:0.8em;">[管理者]</span>' : ''}</span>
                            ${statusText}
                        </div>`;
                });
            });
        });
    }

    async function joinCall(channelId) {
        try {
            await client.join(AGORA_APP_ID, channelId, null, currentUserName);
            client.on("user-published", async (user, mediaType) => {
                await client.subscribe(user, mediaType);
                if (mediaType === "audio") user.audioTrack.play();
                updateOnlineUsers();
            });
            client.on("user-left", () => updateOnlineUsers());
            localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
            await client.publish([localAudioTrack]);
            document.getElementById('join-btn').style.display = 'none';
            document.getElementById('leave-btn').style.display = 'block';
            document.getElementById('call-status-area').style.display = 'block';
            updateOnlineUsers();
        } catch (e) { alert("通話に失敗しました"); }
    }

    function updateOnlineUsers() {
        const area = document.getElementById('online-users');
        if(!area) return;
        const allUsers = [currentUserName, ...client.remoteUsers.map(u => u.uid)];
        area.innerText = allUsers.join(", ");
    }

    async function leaveCall() {
        if (localAudioTrack) { localAudioTrack.stop(); localAudioTrack.close(); localAudioTrack = null; }
        await client.leave();
        if(document.getElementById('join-btn')) document.getElementById('join-btn').style.display = 'block';
        if(document.getElementById('leave-btn')) document.getElementById('leave-btn').style.display = 'none';
        if(document.getElementById('call-status-area')) document.getElementById('call-status-area').style.display = 'none';
    }

    async function showAdminPage() {
        if(unsubscribeThreads) unsubscribeThreads();
        if(unsubscribePosts) unsubscribePosts();
        if(unsubscribeMembers) unsubscribeMembers();
        document.getElementById('root').innerHTML = `<div class="nav"><button class="btn-small" onclick="showThreadList()">戻る</button></div><h1>ユーザー承認</h1><div id="admin-list" class="form-area">読み込み中...</div>`;
        db.collection("requests").where("isApproved", "==", false).onSnapshot(ss => {
            const area = document.getElementById('admin-list');
            if(!area) return;
            if(ss.empty) { area.innerHTML = "未承認のユーザーはいません。"; return; }
            area.innerHTML = "";
            ss.forEach(doc => {
                area.innerHTML += `<div class="req-item"><span>ID: <b>${doc.data().userId}</b></span><button class="btn-small" onclick="approveUser('${doc.id}')">承認する</button></div>`;
            });
        });
    }

    async function approveUser(docId) {
        if(!confirm("このユーザーを承認しますか？")) return;
        await db.collection("requests").doc(docId).update({ isApproved: true });
        alert("承認完了！");
    }

    async function createThread() {
        const title = document.getElementById('newThreadTitle').value;
        const text = document.getElementById('firstPost').value;
        if(!title || !text) return;
        const threadRef = await db.collection("threads").add({ title, creator: currentUserName, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        await db.collection("posts").add({ threadId: threadRef.id, user: currentUserName, text, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        showThreadDetail(threadRef.id, title);
    }

    async function sendReply() {
        const text = document.getElementById('replyText').value;
        if(!text.trim()) return;
        await db.collection("posts").add({ threadId: currentThreadId, user: currentUserName, text, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        document.getElementById('replyText').value = "";
    }
</script>
</body>
</html>
