<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShoBBS - Miiverse & Insta Edition</title>
    <link rel="apple-touch-icon" href="https://chromebookuser0001-cyber.github.io/sho-/shophoto.jpg">
    <link rel="icon" href="https://chromebookuser0001-cyber.github.io/sho-/shophoto.jpg">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="ShoBBS">
    <style>
        :root { 
            --bg: #060610; 
            --card: #101026; 
            --accent: #00f0ff; 
            --pink: #ff007f;
            --green: #39ff14;
            --text: #e2e2ff; 
            --border: rgba(0, 240, 255, 0.25);
            --sub-text: #7c7ca3;
        }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            line-height: 1.5; 
        }
        .container { 
            width: 100%; 
            max-width: 650px; 
            background: var(--card); 
            border: 1px solid var(--border); 
            min-height: 95vh; 
            padding: 15px; 
            box-sizing: border-box; 
            border-radius: 24px; 
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.05);
        }
        h1 { 
            text-align: center; 
            color: var(--accent); 
            letter-spacing: 2px; 
            margin: 10px 0 20px 0; 
            font-size: 1.8em; 
            font-weight: 800;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
        }

        /* 📸 インスタ風ストーリーズ・オンラインエリア */
        .stories-container {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding: 10px 5px 15px 5px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stories-container::-webkit-scrollbar { display: none; } /* スクロールバー非表示 */
        
        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.75em;
            color: var(--text);
            min-width: 60px;
            text-align: center;
        }
        .story-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #1a1a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2em;
            color: var(--accent);
            margin-bottom: 6px;
            border: 2px solid #333;
            box-sizing: border-box;
            position: relative;
        }
        /* オンラインの時はインスタ風のグラデーションリングが光る */
        .story-item.online .story-avatar {
            border: 2px solid transparent;
            background-image: linear-gradient(#101026, #101026), linear-gradient(135deg, var(--pink), var(--accent));
            background-origin: border-box;
            background-clip: content-box, border-box;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }
        .story-item.online .story-avatar::after {
            content: "";
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            background: var(--green);
            border-radius: 50%;
            border: 2px solid var(--card);
        }

        /* 🔔 招待通知用バナー */
        .alert-banner {
            background: rgba(255, 0, 127, 0.15);
            border: 1px solid var(--pink);
            color: #fff;
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 15px;
            font-size: 0.85em;
            font-weight: bold;
            display: none;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.2);
        }

        /* 🟢 ミーバース（Miiverse）風スレッド・投稿カード */
        .thread-item { 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            padding: 16px; 
            margin-bottom: 12px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            border-radius: 16px; 
        }
        .thread-item:hover { 
            border-color: var(--accent); 
            background: rgba(0, 240, 255, 0.02);
            transform: scale(0.99);
        }
        .thread-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75em;
            color: var(--sub-text);
            margin-bottom: 6px;
        }

        .form-area { 
            background: rgba(255, 255, 255, 0.01); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 16px; 
            margin-bottom: 20px; 
            border-radius: 18px; 
        }
        .notice-area {
            border: 1px solid var(--pink);
            background: rgba(255, 0, 127, 0.01);
            padding: 14px;
            margin-bottom: 20px;
            border-radius: 16px;
        }
        .notice-title {
            color: var(--pink);
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 6px;
            text-shadow: 0 0 5px var(--pink);
        }

        input, textarea { 
            width: 100%; 
            padding: 12px; 
            margin: 6px 0; 
            background: #090918; 
            color: #fff; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-sizing: border-box; 
            border-radius: 12px; 
            font-size: 15px; 
            outline: none; 
        }
        input:focus, textarea:focus { border-color: var(--accent); }
        
        button { 
            width: 100%; 
            padding: 12px; 
            border: none; 
            background: linear-gradient(90deg, #00c6ff, #0072ff); 
            color: #fff; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 15px;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .btn-pink { background: linear-gradient(90deg, #ff007f, #ff0055); }

        /* 💬 ミーバース風 投稿吹き出しボックス */
        .post { 
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 14px; 
            margin-bottom: 14px; 
            border-radius: 16px; 
        }
        .post-info { 
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent); 
            font-size: 0.85em; 
            font-weight: bold;
            margin-bottom: 8px; 
        }
        .post-avatar-mini {
            width: 24px;
            height: 24px;
            background: #1a1a3a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
            border: 1px solid var(--accent);
        }
        .post-body {
            font-size: 0.95em;
            color: #fff;
            padding-left: 4px;
        }
        .post-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.03); padding-top: 8px;}

        .glow-btn {
            background: rgba(255, 255, 255, 0.04);
            border: none;
            color: var(--sub-text);
            padding: 4px 12px;
            font-size: 0.8em;
            border-radius: 14px;
            cursor: pointer;
            width: auto;
            margin: 0;
        }
        .glow-btn.liked {
            color: var(--pink);
            background: rgba(255, 0, 127, 0.08);
        }
        .likers-list { font-size: 0.75em; color: var(--sub-text); }
        .nav { display: flex; justify-content: flex-end; margin-bottom: 15px; gap: 6px; }
        .btn-small { width: auto; padding: 5px 12px; font-size: 0.75em; margin: 0; background: rgba(255,255,255,0.05); }
        .del-btn { color: var(--sub-text); cursor: pointer; margin-left: auto; font-size: 0.9em; }
        #call-status-area { margin-bottom: 12px; padding: 10px; background: rgba(0, 240, 255, 0.02); border: 1px dashed var(--accent); border-radius: 12px; font-size: 0.85em; display: none; }
        .view-count { font-size: 0.8em; color: var(--sub-text); }
        .talkers-count { font-size: 0.8em; color: var(--green); font-weight: bold; margin-top: 4px; display: block;}
        .notice-text { color: #fff; font-size: 0.9em; white-space: pre-wrap; }
    </style>
</head>
<body>
<div id="root" class="container"></div>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.21.0.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
    const AGORA_APP_ID = "1563871745f642a5a5332fe7ee3ebeba"; 
    const ADMIN_USER_ID = "admin"; 
    let currentUserName = "";
    let currentThreadId = null;
    let db, client, localAudioTrack;
    let unsubscribeThreads = null, unsubscribePosts = null, unsubscribePresence = null, unsubscribeMembers = null, unsubscribeNotice = null, unsubscribeCalls = null, unsubscribeRequests = null;
    let keepAliveInterval = null;

    const firebaseConfig = {
        apiKey: "AIzaSyD2-XU5R6upCUgSDJbDz7iSoEQCzrzusLk",
        authDomain: "t1s-sns.firebaseapp.com",
        projectId: "t1s-sns",
        storageBucket: "t1s-sns.appspot.com",
        messagingSenderId: "377338728077",
        appId: "1:377338728077:web:1205ed292e4181869adcc4"
    };

    window.onload = () => {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        showLoginPage();
        setupExitEvents();
    };

    function setupExitEvents() {
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "hidden") { goOfflineSync(); } 
            else if (currentUserName) { keepAlive(); if (currentThreadId) updatePresence(currentThreadId); }
        });
        window.addEventListener("beforeunload", () => { goOfflineSync(); });
    }

    function goOfflineSync() {
        if (!currentUserName) return;
        db.collection("users_status").doc(currentUserName).delete();
        db.collection("presence").doc(currentUserName).delete();
        db.collection("active_calls").doc(currentUserName).delete();
    }

    function showLoginPage() {
        document.getElementById('root').innerHTML = `
            <h1>ShoBBS</h1>
            <div class="form-area">
                <input type="text" id="loginId" placeholder="ユーザーID">
                <input type="password" id="pinCode" placeholder="PINコード">
                <button onclick="login()">ログイン</button>
            </div>
            <div style="text-align:center; margin-top:25px; border-top:1px solid rgba(255,255,255,0.05); padding-top:15px;">
                <p style="font-size:0.8em; color:var(--sub-text);">【アカウント申請】</p>
                <input type="text" id="regId" placeholder="希望ユーザーID">
                <input type="password" id="regPin" placeholder="希望PINコード">
                <input type="text" id="inviteBy" placeholder="招待してくれた人のID（任意）">
                <button onclick="register()" class="btn-small" style="width:100%; margin-top:5px;">申請を送る</button>
            </div>`;
    }

    async function login() {
        const id = document.getElementById('loginId').value;
        const pin = document.getElementById('pinCode').value;
        const snap = await db.collection("requests").where("userId", "==", id).get();
        if (snap.empty) return alert("登録がありません");
        const data = snap.docs[0].data();
        if (data.pin == pin && data.isApproved) { 
            currentUserName = id; 
            showThreadList(); 
            keepAlive();
            if(keepAliveInterval) clearInterval(keepAliveInterval);
            keepAliveInterval = setInterval(keepAlive, 30000);
        } else { alert("認証待ち または PIN違い"); }
    }

    async function register() {
        const id = document.getElementById('regId').value;
        const pin = document.getElementById('regPin').value;
        const invite = document.getElementById('inviteBy').value || "なし";
        if(!id || !pin) return alert("IDとPINを入力してください");
        await db.collection("requests").add({ userId: id, pin: pin, inviteBy: invite, isApproved: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        alert("申請完了！通知がadminへ送信されました。");
    }

    async function keepAlive() {
        if (!currentUserName || document.visibilityState === "hidden") return;
        await db.collection("users_status").doc(currentUserName).set({ lastActive: firebase.firestore.FieldValue.serverTimestamp() });
    }

    async function updatePresence(threadId) {
        if (!currentUserName || document.visibilityState === "hidden") return;
        const ref = db.collection("presence").doc(currentUserName);
        if (threadId) { await ref.set({ threadId, lastSeen: firebase.firestore.FieldValue.serverTimestamp() }); } 
        else { await ref.delete(); }
    }

    async function showThreadList() {
        if(unsubscribeThreads) unsubscribeThreads();
        if(unsubscribePosts) unsubscribePosts();
        if(unsubscribePresence) unsubscribePresence();
        if(unsubscribeMembers) unsubscribeMembers();
        if(unsubscribeNotice) unsubscribeNotice();
        if(unsubscribeCalls) unsubscribeCalls();
        if(unsubscribeRequests) unsubscribeRequests();
        await updatePresence(null);
        currentThreadId = null;
        leaveCall();
        
        let adminBtn = (currentUserName === ADMIN_USER_ID) ? `<button class="btn-small" style="color:var(--pink);" onclick="showAdminPage()">管理</button>` : "";
        let adminNoticeForm = (currentUserName === ADMIN_USER_ID) ? `
            <div style="margin-top:10px; border-top:1px dashed rgba(255,0,127,0.2); padding-top:10px;">
                <textarea id="noticeInput" rows="2" placeholder="管理者用お知らせ入力"></textarea>
                <button onclick="updateNotice()" class="btn-small btn-pink" style="color:#fff;">更新</button>
            </div>` : "";

        document.getElementById('root').innerHTML = `
            <div class="nav">
                ${adminBtn}
                <button class="btn-small" onclick="location.reload()">ログアウト</button>
            </div>
            
            <div id="stories-area" class="stories-container"></div>
            
            <div id="inviteAlert" class="alert-banner"></div>

            <h1>ShoBBS</h1>
            
            <div class="form-area">
                <input type="text" id="newThreadTitle" placeholder="コミュニティのタイトル（スレタイ）">
                <textarea id="firstPost" placeholder="みんなに共有したいこと..."></textarea>
                <button onclick="createThread()">コミュニティに投稿する</button>
            </div>
            <div class="notice-area">
                <div class="notice-title">📢 NOTICE BOARD</div>
                <div id="notice-text-content" class="notice-text">お知らせ読み込み中...</div>
                ${adminNoticeForm}
            </div>
            <div id="list-area">コミュニティ読み込み中...</div>`;
        
        // ★ リアルタイム招待通知
        if (currentUserName === ADMIN_USER_ID) {
            unsubscribeRequests = db.collection("requests").where("isApproved", "==", false).onSnapshot(ss => {
                const banner = document.getElementById("inviteAlert");
                if (!banner) return;
                if (!ss.empty) {
                    const r = ss.docs[0].data();
                    banner.innerText = `🔔 【招待通知】${r.userId} が [招待者: ${r.inviteBy}] で参加申請！承認してね！`;
                    banner.style.display = "block";
                } else { banner.style.display = "none"; }
            });
        }

        // 📸 インスタ風オンラインストーリー表示のリアルタイム生成
        unsubscribeMembers = db.collection("users_status").onSnapshot(statusSnap => {
            const onlineUsers = new Set();
            const now = Date.now();
            statusSnap.forEach(doc => {
                const data = doc.data();
                if (data.lastActive && (now - data.lastActive.toMillis() < 120000)) {
                    onlineUsers.add(doc.id);
                }
            });

            db.collection("requests").where("isApproved", "==", true).get().then(snap => {
                const area = document.getElementById("stories-area");
                if(!area) return;
                area.innerHTML = "";
                
                // 自分を先頭に表示
                const sortedUsers = [];
                snap.forEach(doc => {
                    const uId = doc.data().userId;
                    if(uId === currentUserName) sortedUsers.unshift(uId);
                    else sortedUsers.push(uId);
                });

                sortedUsers.forEach(uId => {
                    const isOnline = onlineUsers.has(uId);
                    const initial = uId.substring(0, 2).toUpperCase();
                    area.innerHTML += `
                        <div class="story-item ${isOnline ? 'online' : ''}">
                            <div class="story-avatar">${initial}</div>
                            <div style="text-overflow: ellipsis; overflow: hidden; width: 60px; white-space: nowrap;">${uId === currentUserName ? 'マイ登録' : uId}</div>
                        </div>`;
                });
            });
        });

        unsubscribeNotice = db.collection("system").doc("notice").onSnapshot(doc => {
            const area = document.getElementById("notice-text-content");
            if (!area) return;
            if (doc.exists) { area.innerText = doc.data().text || "現在お知らせはありません。"; }
        });

        unsubscribeCalls = db.collection("active_calls").onSnapshot(callSnap => {
            const threadTalkers = {};
            callSnap.forEach(d => {
                const cData = d.data();
                if(!threadTalkers[cData.threadId]) threadTalkers[cData.threadId] = [];
                threadTalkers[cData.threadId].push(d.id);
            });

            unsubscribePresence = db.collection("presence").onSnapshot(ps => {
                const counts = {};
                ps.forEach(d => { counts[d.data().threadId] = (counts[d.data().threadId] || 0) + 1; });
                
                unsubscribeThreads = db.collection("threads").orderBy("createdAt", "desc").onSnapshot(ss => {
                    const area = document.getElementById('list-area');
                    if(!area) return;
                    area.innerHTML = "";
                    ss.forEach(doc => {
                        const count = counts[doc.id] || 0;
                        const talkers = threadTalkers[doc.id] || [];
                        const data = doc.data();
                        const canDelete = (currentUserName === ADMIN_USER_ID || data.creator === currentUserName);
                        const delBtn = canDelete ? `<span class="del-btn" onclick="event.stopPropagation(); deleteThread('${doc.id}')">🗑️</span>` : "";
                        const talkersText = talkers.length > 0 ? `<span class="talkers-count">🗣️ 通話中: ${talkers.join(", ")}</span>` : "";

                        // 🟢 ミーバースを意識したすっきりかつ見やすいカード
                        area.innerHTML += `
                            <div class="thread-item" onclick="showThreadDetail('${doc.id}', '${data.title.replace(/'/g, "\\'")}')">
                                <div style="flex-grow: 1;">
                                    <div class="thread-header">
                                        <span>投稿者: ${data.creator || 'unknown'}</span>
                                        <span class="view-count">${count > 0 ? '👀 ' + count + '人が閲覧中' : ''}</span>
                                    </div>
                                    <div style="font-size:1.1em; font-weight:bold; color:#fff; margin:4px 0;">${data.title}</div>
                                    ${talkersText}
                                </div>
                                ${delBtn}
                            </div>`;
                    });
                });
            });
        });
    }

    async function updateNotice() {
        const text = document.getElementById("noticeInput").value;
        await db.collection("system").doc("notice").set({ text: text, updatedBy: currentUserName });
        alert("お知らせを更新しました！");
    }

    async function deleteThread(threadId) {
        if(!confirm("削除しますか？")) return;
        await db.collection("threads").doc(threadId).delete();
    }

    async function showThreadDetail(id, title) {
        if(unsubscribeThreads) unsubscribeThreads();
        if(unsubscribePosts) unsubscribePosts();
        if(unsubscribeMembers) unsubscribeMembers();
        if(unsubscribeNotice) unsubscribeNotice();
        if(unsubscribeCalls) unsubscribeCalls();
        if(unsubscribeRequests) unsubscribeRequests();
        await updatePresence(id);
        currentThreadId = id;
        
        document.getElementById('root').innerHTML = `
            <div class="nav"><button class="btn-small" onclick="showThreadList()">コミュニティ一覧に戻る</button></div>
            <h1 style="font-size:1.3em; text-align:left; color:#fff; text-shadow:none; margin-bottom:5px;">${title}</h1>
            <div id="call-status-area"><div>● 通話中: <span id="online-users" style="color:var(--accent); font-weight:bold;">あなたのみ</span></div></div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button id="join-btn" onclick="joinCall('${id}')">通話に参加</button>
                <button id="leave-btn" style="display:none; background:linear-gradient(90deg, #ef4444, #dc2626);" onclick="leaveCall()">通話を終了</button>
            </div>
            <div class="form-area"><textarea id="replyText" rows="3" placeholder="共感のコメントを話そう..."></textarea><button onclick="sendReply()">コメントを投稿</button></div>
            <div id="post-area"></div>`;

        unsubscribePosts = db.collection("posts").where("threadId", "==", id).onSnapshot(ss => {
            const area = document.getElementById('post-area');
            if(!area) return;
            let posts = [];
            ss.forEach(doc => posts.push({id: doc.id, ...doc.data()}));
            posts.sort((a, b) => (b.createdAt?.toMillis() || Date.now()) - (a.createdAt?.toMillis() || Date.now()));
            area.innerHTML = "";
            posts.forEach(p => {
                const delBtn = (currentUserName === ADMIN_USER_ID) ? `<span class="del-btn" onclick="deletePost('${p.id}')">×</span>` : "";
                const likes = p.likes || [];
                const isLiked = likes.includes(currentUserName);
                const likersText = likes.length > 0 ? `<span class="likers-list">⚡ ${likes.length} 人がそうだね！しました</span>` : "";
                const miniInt = p.user.substring(0,2).toUpperCase();

                // 💬 ミーバース風吹き出しコメントスタイル
                area.innerHTML += `
                    <div class="post">
                        <div class="post-info">
                            <div class="post-avatar-mini">${miniInt}</div>
                            <span>${p.user}</span>
                            ${delBtn}
                        </div>
                        <div class="post-body">${p.text}</div>
                        <div class="post-footer">
                            ${likersText}
                            <button class="glow-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${p.id}', ${JSON.stringify(likes).replace(/"/g, '&quot;')})">
                                ⚡ そうだね！ (${likes.length})
                            </button>
                        </div>
                    </div>`;
            });
        });
    }

    async function toggleLike(postId, currentLikes) {
        let newLikes = [...currentLikes];
        if (newLikes.includes(currentUserName)) { newLikes = newLikes.filter(u => u !== currentUserName); } 
        else { newLikes.push(currentUserName); }
        await db.collection("posts").doc(postId).update({ likes: newLikes });
    }

    async function deletePost(postId) {
        if(!confirm("削除しますか？")) return;
        await db.collection("posts").doc(postId).delete();
    }

    async function joinCall(channelId) {
        try {
            await client.join(AGORA_APP_ID, channelId, null, currentUserName);
            await db.collection("active_calls").doc(currentUserName).set({ threadId: channelId, startedAt: firebase.firestore.FieldValue.serverTimestamp() });
            client.on("user-published", async (user, mediaType) => {
                await client.subscribe(user, mediaType);
                if (mediaType === "audio") user.audioTrack.play();
                updateOnlineUsers();
            });
            client.on("user-left", () => updateOnlineUsers());
            localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
            await client.publish([localAudioTrack]);
            document.getElementById('join-btn').style.display = 'none';
            document.getElementById('leave-btn').style.display = 'block';
            document.getElementById('call-status-area').style.display = 'block';
            updateOnlineUsers();
        } catch (e) { alert("通話に失敗しました"); }
    }

    function updateOnlineUsers() {
        const area = document.getElementById('online-users');
        if(!area) return;
        const allUsers = [currentUserName, ...client.remoteUsers.map(u => u.uid)];
        area.innerText = allUsers.join(", ");
    }

    async function leaveCall() {
        if (localAudioTrack) { localAudioTrack.stop(); localAudioTrack.close(); localAudioTrack = null; }
        await client.leave();
        if (currentUserName) { await db.collection("active_calls").doc(currentUserName).delete(); }
        if(document.getElementById('join-btn')) document.getElementById('join-btn').style.display = 'block';
        if(document.getElementById('leave-btn')) document.getElementById('leave-btn').style.display = 'none';
        if(document.getElementById('call-status-area')) document.getElementById('call-status-area').style.display = 'none';
    }

    async function showAdminPage() {
        if(unsubscribeThreads) unsubscribeThreads();
        if(unsubscribePosts) unsubscribePosts();
        if(unsubscribeMembers) unsubscribeMembers();
        if(unsubscribeNotice) unsubscribeNotice();
        if(unsubscribeCalls) unsubscribeCalls();
        if(unsubscribeRequests) unsubscribeRequests();
        
        document.getElementById('root').innerHTML = `
            <div class="nav"><button class="btn-small" onclick="showThreadList()">戻る</button></div>
            <h1>ユーザー承認</h1>
            <div id="admin-list" class="form-area">読み込み中...</div>`;
            
        db.collection("requests").where("isApproved", "==", false).onSnapshot(ss => {
            const area = document.getElementById('admin-list');
            if(!area) return;
            if(ss.empty) { area.innerHTML = "未承認ユーザーはゼロです。"; return; }
            area.innerHTML = "";
            ss.forEach(doc => {
                const r = doc.data();
                area.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid rgba(255,255,255,0.05);">
                        <div>
                            <span>ID: <b>${r.userId}</b></span><br>
                            <span style="font-size:0.8em; color:var(--pink);">招待者: ${r.inviteBy || 'なし'}</span>
                        </div>
                        <button class="btn-small" style="background:var(--accent); color:#000;" onclick="approveUser('${doc.id}')">承認する</button>
                    </div>`;
            });
        });
    }

    async function approveUser(docId) {
        await db.collection("requests").doc(docId).update({ isApproved: true });
        alert("承認しました！");
    }

    async function createThread() {
        const title = document.getElementById('newThreadTitle').value;
        const text = document.getElementById('firstPost').value;
        if(!title || !text) return;
        const threadRef = await db.collection("threads").add({ title, creator: currentUserName, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        await db.collection("posts").add({ threadId: threadRef.id, user: currentUserName, text, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        showThreadDetail(threadRef.id, title);
    }

    async function sendReply() {
        const text = document.getElementById('replyText').value;
        if(!text.trim()) return;
        await db.collection("posts").add({ threadId: currentThreadId, user: currentUserName, text, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        document.getElementById('replyText').value = "";
    }
</script>
</body>
</html>
