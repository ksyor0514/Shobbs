<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShoBBS</title>
    <style>
        :root { 
            --bg: radial-gradient(circle at center, #0f172a 0%, #020617 100%); 
            --card: rgba(15, 23, 42, 0.8); 
            --accent: #00f2ff; 
            --text: #e2e8f0; 
            --border: rgba(0, 242, 255, 0.3);
        }
        body { background: var(--bg); background-attachment: fixed; color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 800px; background: var(--card); border: 1px solid var(--border); backdrop-filter: blur(10px); min-height: 95vh; padding: 20px; box-sizing: border-box; border-radius: 8px; }
        h1 { text-align: center; color: var(--accent); letter-spacing: 5px; border-bottom: 1px solid var(--border); padding-bottom: 15px; font-size: 2em; text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        .thread-item { padding: 15px; border: 1px solid var(--border); margin-bottom: 12px; cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.02); border-radius: 4px; }
        .thread-item:hover { border-color: var(--accent); background: rgba(0, 242, 255, 0.1); }
        .form-area { background: rgba(0,0,0,0.4); border: 1px solid var(--border); padding: 20px; margin: 20px 0; border-radius: 4px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: rgba(0, 0, 0, 0.6); color: #fff; border: 1px solid var(--border); box-sizing: border-box; border-radius: 4px; }
        button { width: 100%; padding: 14px; background: transparent; color: var(--accent); border: 1px solid var(--accent); font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: var(--accent); color: #020617; }
        .post { border-left: 4px solid var(--accent); padding: 15px; margin-bottom: 20px; background: rgba(255,255,255,0.03); }
        /* 通話エリア */
        #call-container { width: 100%; height: 400px; margin-top: 15px; border: 2px solid var(--accent); display: none; }
        .nav { display: flex; justify-content: flex-end; margin-bottom: 15px; gap: 10px; }
        .btn-small { width: auto; padding: 5px 15px; font-size: 0.8em; margin: 0; }
    </style>
</head>
<body>

<div id="root" class="container"></div>

<script src="https://meet.jit.si/external_api.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
    let currentUserName = "";
    let currentThreadId = null;
    let db, jitsiApi = null;

    const firebaseConfig = {
        apiKey: "AIzaSyD2-XU5R6upCUgSDJbDz7iSoEQCzrzusLk",
        authDomain: "t1s-sns.firebaseapp.com",
        projectId: "t1s-sns",
        storageBucket: "t1s-sns.appspot.com",
        messagingSenderId: "377338728077",
        appId: "1:377338728077:web:1205ed292e4181869adcc4"
    };

    window.onload = () => {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        showLoginPage();
    };

    function showLoginPage() {
        document.getElementById('root').innerHTML = `
            <h1>ShoBBS</h1>
            <div class="form-area">
                <input type="text" id="loginId" placeholder="ユーザーID">
                <input type="password" id="pinCode" placeholder="PINコード">
                <button onclick="login()">アクセス開始</button>
            </div>
            <div style="text-align:center; margin-top:30px; border-top: 1px solid var(--border); padding-top: 20px;">
                <input type="text" id="regId" placeholder="希望ID">
                <input type="password" id="regPin" placeholder="希望PIN">
                <button onclick="register()">利用申請</button>
            </div>
        `;
    }

    async function login() {
        const id = document.getElementById('loginId').value;
        const pin = document.getElementById('pinCode').value;
        const snap = await db.collection("requests").where("userId", "==", id).get();
        if (snap.empty) return alert("ユーザーなし");
        const data = snap.docs[0].data();
        if (data.pin == pin && data.isApproved) {
            currentUserName = id;
            showThreadList();
        } else { alert("認証失敗"); }
    }

    async function register() {
        const id = document.getElementById('regId').value;
        const pin = document.getElementById('regPin').value;
        await db.collection("requests").add({ userId: id, pin: pin, isApproved: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        alert("申請完了");
    }

    function showThreadList() {
        currentThreadId = null;
        if(jitsiApi) { jitsiApi.dispose(); jitsiApi = null; }
        document.getElementById('root').innerHTML = `
            <div class="nav"><button class="btn-small" onclick="location.reload()">ログアウト</button></div>
            <h1>ShoBBS</h1>
            <div class="form-area">
                <input type="text" id="newThreadTitle" placeholder="スレッドのタイトル">
                <textarea id="firstPost" placeholder="最初のメッセージ"></textarea>
                <button onclick="createThread()">スレッド作成</button>
            </div>
            <div id="list-area">同期中...</div>
        `;
        db.collection("threads").orderBy("createdAt", "desc").onSnapshot(ss => {
            const area = document.getElementById('list-area');
            if(!area || currentThreadId) return;
            area.innerHTML = "";
            ss.forEach(doc => {
                area.innerHTML += `<div class="thread-item" onclick="showThreadDetail('${doc.id}', '${doc.data().title}')">■ ${doc.data().title}</div>`;
            });
        });
    }

    async function createThread() {
        const title = document.getElementById('newThreadTitle').value;
        const text = document.getElementById('firstPost').value;
        if(!title || !text) return;
        const threadRef = await db.collection("threads").add({ title, creator: currentUserName, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        await db.collection("posts").add({ threadId: threadRef.id, user: currentUserName, text, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        showThreadDetail(threadRef.id, title);
    }

    function showThreadDetail(id, title) {
        currentThreadId = id;
        document.getElementById('root').innerHTML = `
            <div class="nav"><button class="btn-small" onclick="showThreadList()">戻る</button></div>
            <h1>ShoBBS</h1>
            <div style="text-align:center; color:var(--accent); font-weight:bold;">【${title}】</div>
            <button id="call-btn" onclick="toggleCall('${id}')">通話を開始/参加</button>
            <div id="call-container"></div>
            <div class="form-area">
                <textarea id="replyText" rows="3" placeholder="メッセージを入力..."></textarea>
                <button onclick="sendReply()">書き込む</button>
            </div>
            <div id="post-area"></div>
        `;

        db.collection("posts").where("threadId", "==", id).onSnapshot(ss => {
            const area = document.getElementById('post-area');
            if(!area) return;
            let posts = [];
            ss.forEach(doc => posts.push(doc.data()));
            posts.sort((a, b) => (b.createdAt?.toMillis() || Date.now()) - (a.createdAt?.toMillis() || Date.now()));
            area.innerHTML = "";
            posts.forEach(p => {
                area.innerHTML += `<div class="post"><div style="color:var(--accent); font-size:0.8em;">${p.user}</div><div>${p.text}</div></div>`;
            });
        });
    }

    function toggleCall(threadId) {
        const container = document.getElementById('call-container');
        const btn = document.getElementById('call-btn');
        if (container.style.display === 'block') {
            container.style.display = 'none';
            btn.innerText = '通話を開始/参加';
            if(jitsiApi) jitsiApi.dispose();
        } else {
            container.style.display = 'block';
            btn.innerText = '通話を終了';
            const domain = "meet.jit.si";
            const options = {
                roomName: "ShoBBS_" + threadId, // スレッドごとに個別の部屋
                width: "100%",
                height: 400,
                parentNode: container,
                userInfo: { displayName: currentUserName }
            };
            jitsiApi = new JitsiMeetExternalAPI(domain, options);
        }
    }

    async function sendReply() {
        const text = document.getElementById('replyText').value;
        if(!text.trim()) return;
        await db.collection("posts").add({ threadId: currentThreadId, user: currentUserName, text, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        document.getElementById('replyText').value = "";
    }
</script>
</body>
</html>
